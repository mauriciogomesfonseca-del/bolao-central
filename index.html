<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bolão Central — Sistema de Bolões e Sorteios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Source+Sans+3:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1117;
  --bg-2:#161B22;
  --bg-3:#1F2733;
  --card:#161B22;
  --card-hover:#1C2330;
  --linha:#252D3A;
  --texto:#E6EDF6;
  --texto-2:#8B98A9;
  --texto-3:#5C6B7E;
  --azul:#3D7DD8;
  --azul-2:#5B92E0;
  --azul-bg:rgba(61,125,216,0.14);
  --verde:#1ED760;
  --verde-2:#17B852;
  --verde-bg:rgba(30,215,96,0.13);
  --vermelho:#FF4757;
  --vermelho-bg:rgba(255,71,87,0.14);
  --amarelo:#FFC857;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Source Sans 3',sans-serif;
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
}
.font-display{font-family:'Archivo Black',sans-serif;letter-spacing:-0.01em;}
.font-mono{font-family:'Space Mono',monospace;}

/* ---------- LAYOUT ---------- */
#app{display:flex;flex-direction:column;min-height:100vh;}

.ticker-bar{
  background:var(--bg-2);
  border-bottom:1px solid var(--linha);
  display:flex;
  align-items:center;
  padding:0 20px;
  height:42px;
  flex-shrink:0;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
}
.ticker-bar .tk-brand{
  font-family:'Archivo Black',sans-serif;
  font-size:13px;color:var(--texto);
  flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.ticker-bar .tk-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--verde);box-shadow:0 0 8px var(--verde);}
.ticker-bar .tk-brand span{color:var(--azul-2);}
.ticker-bar .tk-sep{width:1px;height:16px;background:var(--linha);flex-shrink:0;}
.ticker-bar .tk-item{
  display:flex;align-items:center;gap:7px;
  font-size:11.5px;
  color:var(--texto-2);
  flex-shrink:0;
}
.ticker-bar .tk-item .tk-val{
  font-family:'Space Mono',monospace;
  font-weight:700;font-size:12.5px;
  color:var(--texto);
}
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--vermelho-bg);
  color:var(--vermelho);
  font-size:9.5px;font-weight:700;letter-spacing:0.04em;
  padding:2px 7px;border-radius:3px;
  text-transform:uppercase;
}
.live-badge .pulse{
  width:6px;height:6px;border-radius:50%;background:var(--vermelho);
  animation:pulse 1.4s infinite;
}
@keyframes pulse{0%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}100%{opacity:1;transform:scale(1);}}

.body-row{display:flex;flex:1;min-height:0;}
.sidebar{
  width:204px;
  background:var(--bg-2);
  border-right:1px solid var(--linha);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.brand{padding:16px 18px 12px;}
.brand .sub{
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--texto-3);
  font-weight:700;
}
.nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px;
  font-size:13.5px;font-weight:600;
  color:var(--texto-2);
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s, color .15s;
  -webkit-user-select:none;
  user-select:none;
}
.nav-item:hover{background:rgba(255,255,255,0.03);color:var(--texto);}
.nav-item.active{
  background:var(--azul-bg);
  color:var(--azul-2);
  border-left-color:var(--azul);
}
.nav-icon{width:18px;text-align:center;font-size:14px;}
.nav-section-label{
  font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--texto-3);
  padding:14px 18px 5px;
}
.sidebar-foot{
  padding:14px 18px;
  border-top:1px solid var(--linha);
  font-size:12px;
}
.user-pill{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.avatar-mini{
  width:27px;height:27px;border-radius:6px;
  background:linear-gradient(135deg, var(--azul), var(--azul-2));
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;flex-shrink:0;
}
.btn-logout{
  width:100%;
  background:transparent;
  border:1px solid var(--linha);
  color:var(--texto-2);
  padding:7px;border-radius:var(--radius);
  font-size:12px;cursor:pointer;font-weight:600;
}
.btn-logout:hover{background:rgba(255,255,255,0.04);color:var(--texto);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:var(--bg-2);
  border-bottom:1px solid var(--linha);
  padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.page-title{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--texto);}
.page-sub{font-size:12px;color:var(--texto-2);margin-top:2px;}
.content{flex:1;padding:24px 28px;overflow-y:auto;}

/* ---------- LOGIN SCREEN ---------- */
.login-wrap{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}
.login-wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 80% 10%, rgba(61,125,216,0.16), transparent 42%),
    radial-gradient(circle at 15% 95%, rgba(30,215,96,0.08), transparent 38%);
}
.login-card{
  position:relative;
  z-index:1;
  width:380px;
  background:var(--bg-2);
  border:1px solid var(--linha);
  border-radius:12px;
  box-shadow:0 24px 70px rgba(0,0,0,0.6);
  padding:34px 32px;
}
.login-badge{text-align:center;margin-bottom:22px;}
.login-badge .title{font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--texto);line-height:1.1;}
.login-badge .title span{color:var(--azul-2);}
.login-badge .sub{
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--verde);margin-top:6px;font-weight:700;
}
.field{margin-bottom:14px;}
.field label{
  display:block;font-size:11.5px;font-weight:700;
  color:var(--texto-2);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:0.04em;
}
.field input, .field select, .field textarea{
  width:100%;
  border:1.5px solid var(--linha);
  background:var(--bg-3);
  border-radius:var(--radius);
  padding:10px 12px;
  font-size:14px;
  font-family:'Source Sans 3',sans-serif;
  color:var(--texto);
}
.field input::placeholder{color:var(--texto-3);}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:2px solid var(--azul);
  outline-offset:1px;
  border-color:var(--azul);
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--radius);
  padding:10px 18px;
  font-size:13px;font-weight:700;
  cursor:pointer;
  transition:transform .08s, background .15s, box-shadow .15s;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--verde);color:#04140A;}
.btn-primary:hover{background:var(--verde-2);box-shadow:0 0 0 3px var(--verde-bg);}
.btn-block{width:100%;}
.btn-secondary{background:var(--azul);color:#fff;}
.btn-secondary:hover{background:var(--azul-2);}
.btn-outline{background:transparent;border:1.5px solid var(--linha);color:var(--texto);}
.btn-outline:hover{background:rgba(255,255,255,0.04);border-color:var(--texto-3);}
.btn-danger{background:var(--vermelho);color:#fff;}
.btn-danger:hover{background:#E63946;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn:focus-visible{outline:3px solid var(--amarelo);outline-offset:2px;}

.login-toggle{display:flex;background:var(--bg-3);border-radius:var(--radius);padding:3px;margin-bottom:18px;}
.login-toggle button{
  flex:1;background:transparent;border:none;padding:8px;
  font-size:12px;font-weight:700;letter-spacing:0.04em;
  border-radius:6px;cursor:pointer;color:var(--texto-2);
  text-transform:uppercase;
}
.login-toggle button.active{background:var(--azul);color:#fff;}
.login-error{
  background:var(--vermelho-bg);color:var(--vermelho);
  border:1px solid rgba(255,71,87,0.3);
  font-size:12px;padding:8px 10px;border-radius:var(--radius);
  margin-bottom:12px;
}
.login-hint{margin-top:16px;font-size:11px;color:var(--texto-3);text-align:center;line-height:1.6;}

/* ---------- CARDS / GRID ---------- */
.grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media (max-width:720px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{
  background:var(--card);
  border:1px solid var(--linha);
  border-radius:var(--radius);
  padding:18px;
  transition:border-color .15s;
}
.card-flush{padding:0;overflow:hidden;}

.stat-card{
  background:var(--card);
  border:1px solid var(--linha);
  border-radius:var(--radius);
  padding:16px 18px;
  position:relative;
  overflow:hidden;
}
.stat-card::before{
  content:"";position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--azul);
}
.stat-card.alert::before{background:var(--vermelho);}
.stat-card.good::before{background:var(--verde);}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);font-weight:700;margin-bottom:7px;}
.stat-value{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--texto);}
.stat-sub{font-size:11px;color:var(--texto-3);margin-top:4px;}

.section-title{
  font-family:'Archivo Black',sans-serif;
  font-size:14px;
  color:var(--texto);
  margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-title .right{font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:600;}

/* ---------- TABLE ---------- */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  text-align:left;
  font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;
  color:var(--texto-2);font-weight:700;
  padding:10px 12px;
  border-bottom:1px solid var(--linha);
  background:var(--bg-3);
}
td{padding:10px 12px;border-bottom:1px solid var(--linha);vertical-align:middle;color:var(--texto);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}

.badge-status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:4px;
  text-transform:uppercase;letter-spacing:0.03em;
}
.badge-pago{background:var(--verde-bg);color:var(--verde);}
.badge-pendente{background:rgba(255,200,87,0.14);color:var(--amarelo);}
.badge-atrasado{background:var(--vermelho-bg);color:var(--vermelho);}
.badge-isento{background:rgba(139,152,169,0.14);color:var(--texto-2);}
.badge-ativo{background:var(--verde-bg);color:var(--verde);}
.badge-inativo{background:rgba(139,152,169,0.14);color:var(--texto-2);}

/* ---------- LINHA DE ODDS (signature element) ---------- */
.sumula{
  background:var(--card);
  border:1px solid var(--linha);
  border-radius:var(--radius);
  overflow:hidden;
  transition:border-color .15s, background .15s;
}
.sumula:hover{border-color:#34405A;background:var(--card-hover);}
.sumula-head{
  background:var(--bg-3);
  color:var(--texto-2);
  padding:8px 14px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:10.5px;
  text-transform:uppercase;letter-spacing:0.05em;
}
.sumula-head .comp{color:var(--azul-2);font-weight:700;}
.sumula-body{
  padding:16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.sumula-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;min-width:0;}
.shield{
  width:36px;height:36px;
  background:var(--bg-3);
  color:var(--texto);
  display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black',sans-serif;font-size:11px;
  border-radius:50%;
  border:1.5px solid var(--linha);
}
.shield.flag-emoji{
  font-size:22px;
  background:transparent;
  border-color:transparent;
  letter-spacing:0;
}
@media (max-width:860px){
  .shield.flag-emoji{font-size:18px;}
}
@media (max-width:420px){
  .shield.flag-emoji{font-size:16px;}
}
.sumula-team .name{font-size:11.5px;font-weight:600;color:var(--texto);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.placar-box{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.placar-input{
  width:38px;height:38px;
  text-align:center;
  font-family:'Space Mono',monospace;
  font-size:17px;font-weight:700;
  border:1.5px solid var(--linha);
  border-radius:6px;
  background:var(--bg-3);
  color:var(--verde);
  transition:border-color .15s, background .15s;
}
.placar-input:focus{outline:none;border-color:var(--verde);background:var(--bg);}
.placar-input:disabled{background:var(--bg-3);color:var(--texto-3);}
.placar-sep{font-family:'Archivo Black',sans-serif;color:var(--texto-3);font-size:13px;}
.sumula-foot{
  padding:9px 14px;
  border-top:1px solid var(--linha);
  font-size:11px;color:var(--texto-2);
  display:flex;justify-content:space-between;align-items:center;
}
.pts-pill{
  font-family:'Space Mono',monospace;
  font-weight:700;color:var(--verde);
  background:var(--verde-bg);
  padding:2px 8px;border-radius:4px;
  font-size:11.5px;
}

/* ---------- MODAL ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.modal{
  background:var(--bg-2);
  border:1px solid var(--linha);
  border-radius:12px;
  max-width:520px;width:100%;
  max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,0.6);
}
.modal-head{
  padding:18px 22px;
  border-bottom:1px solid var(--linha);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-head h3{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--texto);}
.modal-close{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--texto-2);line-height:1;}
.modal-close:hover{color:var(--texto);}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--linha);display:flex;justify-content:flex-end;gap:8px;}

/* ---------- MISC ---------- */
.empty-state{text-align:center;padding:50px 20px;color:var(--texto-2);}
.empty-state .icon{font-size:34px;margin-bottom:10px;}
.empty-state .msg{font-size:14px;font-weight:700;color:var(--texto);margin-bottom:4px;}
.empty-state .hint{font-size:12px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.search-box{
  border:1.5px solid var(--linha);background:var(--bg-3);border-radius:var(--radius);
  padding:8px 12px;font-size:13px;min-width:220px;color:var(--texto);
}
.search-box::placeholder{color:var(--texto-3);}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--linha);margin-bottom:18px;}
.tab{
  padding:9px 16px;font-size:13px;font-weight:700;color:var(--texto-2);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab.active{color:var(--texto);border-bottom-color:var(--verde);}
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--bg-2);color:var(--texto);
  border:1px solid var(--linha);
  padding:12px 18px;border-radius:var(--radius);
  font-size:13px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  z-index:200;
  display:flex;align-items:center;gap:8px;
  border-left:3px solid var(--verde);
  animation:slidein .25s ease;
}
.toast.error{border-left-color:var(--vermelho);}
@keyframes slidein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.flex-row{display:flex;gap:10px;align-items:center;}
.text-muted{color:var(--texto-2);font-size:12px;}
.divider{height:1px;background:var(--linha);margin:16px 0;}
.progress-bar{height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--verde);}
.pill-tag{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
  padding:2px 8px;border-radius:4px;background:var(--bg-3);color:var(--texto-2);
}
.rank-1 .pos-badge{background:var(--amarelo);color:#1B1404;}
.rank-2 .pos-badge{background:#9FB0C7;color:#0D1117;}
.rank-3 .pos-badge{background:#C97A40;color:#fff;}
.pos-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:6px;
  font-family:'Space Mono',monospace;font-weight:700;font-size:12px;
  background:var(--bg-3);color:var(--texto-2);
}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--linha);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:var(--azul-2);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}

/* ---------- RESPONSIVO / MOBILE ---------- */
.menu-toggle{
  display:none;
  background:transparent;border:1px solid var(--linha);
  color:var(--texto);width:34px;height:34px;border-radius:var(--radius);
  font-size:18px;cursor:pointer;align-items:center;justify-content:center;
  flex-shrink:0;
}
.sidebar-overlay{display:none;}

@media (max-width:860px){
  .ticker-bar{padding:0 12px;gap:12px;}
  .ticker-bar .tk-item{display:none;}
  .ticker-bar .tk-sep{display:none;}
  .ticker-bar .tk-brand{font-size:12px;}

  .menu-toggle{display:flex;}

  .body-row{position:relative;}
  .sidebar{
    position:fixed;
    top:42px; bottom:0; left:0;
    z-index:50;
    width:240px;
    max-width:80vw;
    transform:translateX(-100%);
    transition:transform .2s ease;
    box-shadow:4px 0 24px rgba(0,0,0,0.4);
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{
    display:none;
    position:fixed;
    top:42px; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.5);
    z-index:40;
  }
  .sidebar-overlay.open{display:block;}

  .main{width:100%;min-width:0;}
  .topbar{padding:12px 16px;gap:10px;}
  .topbar-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .page-title{font-size:17px;}
  .page-sub{display:none;}
  .content{padding:14px;}

  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}

  .sumula-body{padding:12px 8px;gap:4px;}
  .sumula-team{min-width:0;}
  .sumula-team .name{font-size:10.5px;max-width:100%;}
  .shield{width:30px;height:30px;font-size:9.5px;}
  .shield.flag-emoji{font-size:18px;width:30px;height:30px;}
  .placar-box{gap:4px;}
  .placar-input{width:32px;height:32px;font-size:14px;}
  .placar-sep{font-size:11px;}

  .stat-value{font-size:21px;}

  .modal{max-width:94vw;}
}

@media (max-width:420px){
  .sumula-team .name{font-size:9.5px;}
  .shield{width:26px;height:26px;font-size:8.5px;}
  .placar-input{width:28px;height:28px;font-size:13px;}
}
</style>

// Retorna emoji de bandeira ou o badge com a sigla (fallback)
function bandeira(sigla, nome){
  const s = (sigla||'').toUpperCase().trim();
  const emoji = BANDEIRAS[s];
  if(emoji) return `<span class="shield flag-emoji" title="${escapeHtml(nome||sigla)}">${emoji}</span>`;
  // fallback: shield com sigla (≤3 chars)
  const label = s || (nome||'').slice(0,3).toUpperCase();
  return `<span class="shield" title="${escapeHtml(nome||sigla)}">${escapeHtml(label)}</span>`;
}

const Session = {
  _user: null, // perfil (Map_.usuario) da pessoa logada, cacheado em memória

  async init(){
    const { data } = await sb.auth.getSession();
    if(data && data.session){
      await this._loadProfile(data.session.user.id);
    }
    return this._user;
  },

  async _loadProfile(authUserId){
    const { data, error } = await sb.from('perfis').select('*').eq('id', authUserId).maybeSingle();
    if(error || !data){
      this._user = null;
      return null;
    }
    // garante e-mail no perfil em memória (vem do auth, não da tabela perfis)
    const { data: authData } = await sb.auth.getUser();
    const perfil = Map_.usuario(data);
    perfil.email = authData && authData.user ? authData.user.email : '';
    this._user = perfil;
    return this._user;
  },

  currentUser(){ return this._user; },

  async clear(){
    await sb.auth.signOut();
    this._user = null;
  },
};

function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error' ? ' error' : '');
  el.innerHTML = (type==='error' ? '⚠ ' : '✓ ') + escapeHtml(msg);
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3200);
}

const Auth = {

  renderLoginForm(){
    const area = document.getElementById('login-form-area');

      <form id="form-login">

        <div class="field">
          <label>Senha</label>
          <input type="password" id="li-senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="li-submit">Entrar</button>
      </form>
    `;
    document.getElementById('form-login').onsubmit = async (e) => {
      e.preventDefault();
      if(this.loading) return;
      const email = document.getElementById('li-email').value.trim().toLowerCase();
      const senha = document.getElementById('li-senha').value;

      this.loading = true;
      const btn = document.getElementById('li-submit');
      btn.disabled = true; btn.textContent = 'Entrando...';

      const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

      if(error){
        this.loading = false;
        this.error = error.message.includes('Invalid login credentials')
          ? 'E-mail ou senha incorretos.'
          : 'Não foi possível entrar: ' + error.message;
        this.render();
        return;
      }

      const perfil = await Session._loadProfile(data.user.id);
      if(!perfil){
        await sb.auth.signOut();
        this.loading = false;
        this.error = 'Sua conta não tem um cadastro completo. Contate o administrador.';
        this.render();
        return;
      }
      if(perfil.status === 'inativo'){
        await sb.auth.signOut();
        this.loading = false;
        this.error = 'Sua conta está inativa. Contate o administrador.';
        this.render();
        return;
      }

      Store.log(perfil.id, 'Login realizado.');
      await App.boot();

  },

  renderCadastroForm(){
    const area = document.getElementById('login-form-area');
    area.innerHTML = `
      <form id="form-cadastro">
        <div class="field">
          <label>Nome completo</label>
          <input type="text" id="ca-nome" required>
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="ca-email" required>
        </div>
        <div class="field">
          <label>Telefone</label>
          <input type="text" id="ca-telefone" placeholder="(00) 00000-0000">
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="ca-senha" required minlength="6" placeholder="mínimo 6 caracteres">
        </div>
        <div class="field">
          <label>Código de convite</label>
          <input type="text" id="ca-convite" required placeholder="ex: BOLAO2026" style="text-transform:uppercase;">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="ca-submit">Criar conta</button>

      e.preventDefault();
      if(this.loading) return;
      const nome = document.getElementById('ca-nome').value.trim();
      const email = document.getElementById('ca-email').value.trim().toLowerCase();
      const telefone = document.getElementById('ca-telefone').value.trim();
      const senha = document.getElementById('ca-senha').value;
      const convite = document.getElementById('ca-convite').value.trim();

      this.loading = true;
      const btn = document.getElementById('ca-submit');
      btn.disabled = true; btn.textContent = 'Criando conta...';

      // 1. Cria o usuário no Supabase Auth
      const { data, error } = await sb.auth.signUp({ email, password: senha });

      if(error){
        this.loading = false;
        this.error = error.message.includes('already registered')
          ? 'Já existe uma conta cadastrada com esse e-mail.'
          : 'Não foi possível criar a conta: ' + error.message;
        this.render();
        return;
      }

      // Se a sessão não veio automaticamente (ex: confirmação de e-mail ligada), tenta logar.
      if(!data.session){
        const { error: loginErr } = await sb.auth.signInWithPassword({ email, password: senha });
        if(loginErr){
          this.loading = false;
          this.error = 'Conta criada, mas não foi possível entrar automaticamente. Tente fazer login.';
          this.mode = 'login';
          this.render();
          return;
        }
      }

      // 2. Valida o código de convite e cria o perfil de negócio (RPC no banco)
      const { error: rpcError } = await sb.rpc('cadastrar_com_convite', {
        p_nome: nome,
        p_telefone: telefone,
        p_codigo_convite: convite,
      });

      if(rpcError){
        this.loading = false;
        // Desfaz a sessão para não deixar um "usuário fantasma" sem perfil logado
        await sb.auth.signOut();
        this.error = rpcError.message.includes('Código de convite')
          ? rpcError.message
          : 'Não foi possível concluir o cadastro: ' + rpcError.message;
        this.render();
        return;
      }

      const { data: userData } = await sb.auth.getUser();
      await Session._loadProfile(userData.user.id);
      toast('Conta criada com sucesso! Bem-vindo(a).');
      await App.boot();
    };
  }
};

// LÓGICA DE NEGÓCIO
// =====================================================================
const Logic = {
  // Calcula pontos de um palpite dado o resultado oficial e as regras do bolão
  calcularPontos(palpite, jogo, bolao){
    if(jogo.placarMandante===null || jogo.placarVisitante===null) return 0;
    const regras = bolao.regras || { vencedor:3, empate:3, placarExato:10, bonus:0 };
    const pm = palpite.placarMandante, pv = palpite.placarVisitante;
    const rm = jogo.placarMandante, rv = jogo.placarVisitante;

    if(pm === rm && pv === rv) return regras.placarExato;

    const palpiteResultado = pm > pv ? 'mandante' : (pm < pv ? 'visitante' : 'empate');
    const realResultado = rm > rv ? 'mandante' : (rm < rv ? 'visitante' : 'empate');

    if(palpiteResultado === realResultado){
      return palpiteResultado === 'empate' ? regras.empate : regras.vencedor;
    }
    return 0;
  },

  // Recalcula pontos de todos os palpites vinculados a um jogo (chamado ao lançar resultado).
  // O cálculo de fato acontece no banco (função recalcular_pontos_jogo), garantindo que
  // o resultado seja sempre consistente com a regra oficial gravada no bolão.
  async recalcularPontosDoJogo(jogoId){
    const { error } = await sb.rpc('recalcular_pontos_jogo', { p_jogo_id: jogoId });
    if(error){ console.error('Erro ao recalcular pontos:', error); return; }
    await Store.reloadPalpites();
  },

  rankingDoBolao(bolaoId, periodo){
    const db = Store.data;
    const jogosDoBolao = db.jogos.filter(j => j.bolaoId === bolaoId).map(j=>j.id);
    const participantes = db.usuarios.filter(u => u.perfil === 'participante');

    let palpitesConsiderados = db.palpites.filter(p => jogosDoBolao.includes(p.jogoId));

    if(periodo === 'mensal'){
      const mesAtual = new Date().toISOString().slice(0,7);
      const jogosDoMes = db.jogos.filter(j => j.bolaoId===bolaoId && j.dataHora && j.dataHora.slice(0,7)===mesAtual).map(j=>j.id);
      palpitesConsiderados = palpitesConsiderados.filter(p => jogosDoMes.includes(p.jogoId));
    }

    const linhas = participantes.map(u => {
      const meus = palpitesConsiderados.filter(p => p.usuarioId === u.id);
      const jogosFinalizados = meus.filter(p => {
        const j = db.jogos.find(jj=>jj.id===p.jogoId);
        return j && j.status==='finalizado';
      });
      const acertos = jogosFinalizados.filter(p => p.pontos > 0).length;
      const erros = jogosFinalizados.filter(p => p.pontos === 0).length;
      const pontuacao = meus.reduce((s,p)=>s+(p.pontos||0),0);
      const aproveitamento = jogosFinalizados.length ? Math.round((acertos/jogosFinalizados.length)*100) : 0;
      return { usuario:u, pontuacao, acertos, erros, aproveitamento, jogosPalpitados: meus.length };
    });

    linhas.sort((a,b)=> b.pontuacao - a.pontuacao || b.aproveitamento - a.aproveitamento);
    linhas.forEach((l,i)=> l.posicao = i+1);
    return linhas;
  },

  // ---------- PAGAMENTOS / FINANCEIRO ----------
  resumoFinanceiro(bolaoId){
    const db = Store.data;
    const pagtos = bolaoId ? db.pagamentos.filter(p=>p.bolaoId===bolaoId) : db.pagamentos;
    const totalArrecadado = pagtos.reduce((s,p)=> s + (p.valorPago||0), 0);
    const totalPendente = pagtos.filter(p=>p.status==='pendente'||p.status==='atrasado')
      .reduce((s,p)=> s + (p.valorInscricao - (p.valorPago||0)), 0);
    const pagantes = pagtos.filter(p=>p.status==='pago').length;
    const inadimplentes = pagtos.filter(p=>p.status==='atrasado').length;
    return { totalArrecadado, totalPendente, pagantes, inadimplentes, total: pagtos.length };
  },

  // Atualiza pagamentos vencidos em segundo plano (não bloqueia a UI).
  // Chamada via "fire and forget" a partir do boot/navegação; o resultado
  // só aparece após o próximo reload do cache de pagamentos.
  async atualizarStatusPagamentosEmSegundoPlano(){
    const db = Store.data;
    const hoje = todayISO();
    const atrasar = db.pagamentos.filter(p => p.status === 'pendente' && p.dataVencimento && p.dataVencimento < hoje);
    if(atrasar.length === 0) return;
    await Promise.all(atrasar.map(p =>
      sb.from('pagamentos').update({ status:'atrasado' }).eq('id', p.id)
    ));
    atrasar.forEach(p => { p.status = 'atrasado'; }); // reflete no cache local já carregado
  },

  // ---------- DASHBOARD ----------
  // Síncrona: lê só o cache já carregado em Store.data (não bate no Supabase).
  // A checagem de pagamentos atrasados roda separadamente, em segundo plano.
  dashboardStats(){
    const db = Store.data;
    const fin = this.resumoFinanceiro();
    return {
      participantesCadastrados: db.usuarios.filter(u=>u.perfil==='participante').length,
      participantesAtivos: db.usuarios.filter(u=>u.perfil==='participante' && u.status==='ativo').length,
      pagamentosRecebidos: fin.totalArrecadado,
      pagamentosPendentes: fin.totalPendente,
      jogosCadastrados: db.jogos.length,
      jogosFinalizados: db.jogos.filter(j=>j.status==='finalizado').length,
      boloesAtivos: db.boloes.filter(b=>b.status==='ativo').length,
      sorteiosAbertos: db.sorteios.filter(s=>s.status==='aberto').length,
    };
  },

  // ---------- SORTEIOS ----------
  cotasDisponiveis(sorteio){
    const ocupadas = new Set(sorteio.cotas.map(c=>c.numero));
    const livres = [];
    for(let i=1;i<=sorteio.totalCotas;i++){ if(!ocupadas.has(i)) livres.push(i); }
    return livres;
  },

  async realizarSorteio(sorteioId){
    const db = Store.data;
    const sorteio = db.sorteios.find(s=>s.id===sorteioId);
    if(!sorteio) return null;
    const pagas = sorteio.cotas.filter(c=>c.status==='pago');
    if(pagas.length===0) return null;
    const vencedora = pagas[Math.floor(Math.random()*pagas.length)];
    const agora = new Date().toISOString();

    const { error } = await sb.from('sorteios').update({
      numero_vencedor: vencedora.numero,
      vencedor_usuario_id: vencedora.usuarioId,
      sorteado_em: agora,
      status: 'finalizado',
    }).eq('id', sorteioId);

    if(error){ console.error('Erro ao realizar sorteio:', error); return null; }

    await Store.reloadSorteios();
    return { numero: vencedora.numero, usuarioId: vencedora.usuarioId, data: agora };
  },
};

    App.openModal('jogo-form', null);

  document.getElementById('content').innerHTML = `

    </div>

Pages._sumulaEditavel = function(j){
  const db = Store.data;
  const bolao = db.boloes.find(b=>b.id===j.bolaoId);
  const finalizado = j.status==='finalizado';
  const isLive = !finalizado && j.dataHora && new Date(j.dataHora) <= new Date();
  return `
  <div class="sumula">
    <div class="sumula-head">
      <span class="comp">${escapeHtml(bolao?bolao.nome:'')}</span>
      ${isLive ? `<span class="live-badge"><span class="pulse"></span>Ao vivo</span>` : `<span>${escapeHtml(j.rodada||'')}</span>`}
    </div>
    <div class="sumula-body">
      <div class="sumula-team">${bandeira(j.mandanteSigla, j.mandante)}<div class="name">${escapeHtml(j.mandante)}</div></div>
      <div class="placar-box">
        <input type="number" min="0" class="placar-input font-mono" data-jogo="${j.id}" data-lado="mandante" value="${j.placarMandante??''}" placeholder="-">
        <span class="placar-sep">×</span>
        <input type="number" min="0" class="placar-input font-mono" data-jogo="${j.id}" data-lado="visitante" value="${j.placarVisitante??''}" placeholder="-">
      </div>
      <div class="sumula-team">${bandeira(j.visitanteSigla, j.visitante)}<div class="name">${escapeHtml(j.visitante)}</div></div>
    </div>
    <div class="sumula-foot">
      <span>${j.dataHora ? new Date(j.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Sem data'} · ${finalizado?'<strong style="color:var(--azul);">Finalizado</strong>':'Agendado'}</span>
      <span class="flex-row" style="gap:6px;">
        <button class="btn btn-sm btn-outline" data-edit-jogo="${j.id}">Editar</button>
        <button class="btn btn-sm btn-primary" data-salvar-placar="${j.id}">Salvar resultado</button>
        <button class="btn btn-sm btn-danger" data-del-jogo="${j.id}">×</button>
      </span>
    </div>
  </div>`;
};

Pages._bindSumulaEvents = function(){
  document.querySelectorAll('[data-salvar-placar]').forEach(btn=>{
    btn.onclick = async () => {
      const jogoId = btn.dataset.salvarPlacar;
      const inM = document.querySelector(`[data-jogo="${jogoId}"][data-lado="mandante"]`);
      const inV = document.querySelector(`[data-jogo="${jogoId}"][data-lado="visitante"]`);
      if(inM.value==='' || inV.value===''){ toast('Informe os dois placares.', 'error'); return; }
      const db = Store.data;
      const jogo = db.jogos.find(j=>j.id===jogoId);
      const placarMandante = parseInt(inM.value,10);
      const placarVisitante = parseInt(inV.value,10);

      btn.disabled = true; btn.textContent = 'Salvando...';

      const { error } = await sb.from('jogos').update({
        placar_mandante: placarMandante,
        placar_visitante: placarVisitante,
        status: 'finalizado',
        resultado_lancado_por: Session.currentUser().id,
        resultado_lancado_em: new Date().toISOString(),
      }).eq('id', jogoId);

      if(error){ toast('Erro ao salvar resultado: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Salvar resultado'; return; }

      await Store.reloadJogos();
      await Logic.recalcularPontosDoJogo(jogoId);
      Store.log(Session.currentUser().id, `Resultado lançado: ${jogo.mandante} ${placarMandante} x ${placarVisitante} ${jogo.visitante}.`);
      toast('Resultado salvo e pontuações recalculadas!');
      Pages.adminJogos();
    };
  });
  document.querySelectorAll('[data-edit-jogo]').forEach(btn=>{
    btn.onclick = () => App.openModal('jogo-form', Store.data.jogos.find(j=>j.id===btn.dataset.editJogo));
  });
  document.querySelectorAll('[data-del-jogo]').forEach(btn=>{
    btn.onclick = async () => {
      const jogo = Store.data.jogos.find(j=>j.id===btn.dataset.delJogo);
      if(!confirm(`Excluir o jogo ${jogo.mandante} x ${jogo.visitante}?`)) return;
      btn.disabled = true;
      // ON DELETE CASCADE remove palpites vinculados automaticamente.
      // Se o jogo já começou e existem palpites travados, o banco vai rejeitar a exclusão
      // dos palpites (preserva o comprovante) e isso retorna erro aqui — esperado e correto.
      const { error } = await sb.from('jogos').delete().eq('id', jogo.id);
      if(error){
        toast('Não foi possível excluir: ' + (error.message.includes('travado') ? 'já existem palpites travados para este jogo.' : error.message), 'error');
        btn.disabled = false;
        return;
      }
      Store.log(Session.currentUser().id, `Jogo "${jogo.mandante} x ${jogo.visitante}" excluído.`);
      toast('Jogo excluído.');
      await Store.loadAll();
      Pages.adminJogos();
    };
  });
};

Pages._cardRelatorio = function(titulo, sub, key){
  return `
  <div class="card">
    <div style="font-weight:700;color:var(--texto);margin-bottom:4px;">${escapeHtml(titulo)}</div>
    <div class="text-muted" style="margin-bottom:14px;">${escapeHtml(sub)}</div>
    <button class="btn btn-outline btn-sm" data-export="${key}">Exportar CSV</button>
  </div>`;
};

Pages._exportarCSV = function(tipo){
  const db = Store.data;
  let rows = [], filename = `${tipo}.csv`;
  if(tipo==='participantes'){
    rows = [['Nome','E-mail','Telefone','Status','Data de cadastro']];
    db.usuarios.filter(u=>u.perfil==='participante').forEach(u=> rows.push([u.nome,u.email,u.telefone,u.status,u.dataCadastro]));
  } else if(tipo==='pagamentos'){
    rows = [['Participante','Bolão','Valor inscrição','Valor pago','Vencimento','Status']];
    db.pagamentos.forEach(p=>{
      const u = db.usuarios.find(x=>x.id===p.usuarioId), b = db.boloes.find(x=>x.id===p.bolaoId);
      rows.push([u?u.nome:'', b?b.nome:'', p.valorInscricao, p.valorPago, p.dataVencimento, p.status]);
    });
  } else if(tipo==='ranking'){
    rows = [['Posição','Nome','Pontuação','Acertos','Erros','Aproveitamento %']];
    const bolao = db.boloes[0];
    if(bolao) Logic.rankingDoBolao(bolao.id,'geral').forEach(l=> rows.push([l.posicao,l.usuario.nome,l.pontuacao,l.acertos,l.erros,l.aproveitamento]));
  } else if(tipo==='jogos'){
    rows = [['Mandante','Visitante','Placar mandante','Placar visitante','Data','Status']];
    db.jogos.forEach(j=> rows.push([j.mandante,j.visitante,j.placarMandante,j.placarVisitante,j.dataHora,j.status]));
  } else if(tipo==='sorteios'){
    rows = [['Nome','Valor cota','Total cotas','Cotas vendidas','Status','Vencedor (número)']];
    db.sorteios.forEach(s=> rows.push([s.nome,s.valorCota,s.totalCotas,s.cotas.length,s.status, s.vencedor?s.vencedor.numero:'']));
  } else if(tipo==='premiacoes'){
    rows = [['Sorteio','Número vencedor','Participante','Data']];
    db.sorteios.filter(s=>s.vencedor).forEach(s=>{
      const u = db.usuarios.find(x=>x.id===s.vencedor.usuarioId);
      rows.push([s.nome, s.vencedor.numero, u?u.nome:'', s.vencedor.data]);
    });
  }
  const csv = rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Relatório exportado.');
};

Pages.partPalpites = function(user){
  App.setTopbar('Meus Palpites', 'Informe o placar antes do início de cada partida');
  const db = Store.data;
  const LIMITE_PALPITES = 3;
  const jogosAgendados = db.jogos.filter(j=>j.status==='agendado').sort((a,b)=>new Date(a.dataHora)-new Date(b.dataHora));
  const jogosFinalizados = db.jogos.filter(j=>j.status==='finalizado').sort((a,b)=>new Date(b.dataHora)-new Date(a.dataHora));

  document.getElementById('content').innerHTML = `
    <div class="tabs">
      <div class="tab active" data-tab="abertos">Abertos para palpite</div>
      <div class="tab" data-tab="finalizados">Resultados &amp; meus pontos</div>
    </div>
    <div id="tab-content"></div>
  `;

  const renderAbertos = () => {
    document.getElementById('tab-content').innerHTML = `
      <div class="grid grid-3">
        ${jogosAgendados.length ? jogosAgendados.map(j=>{
          const meusPalpites = db.palpites.filter(p=>p.jogoId===j.id && p.usuarioId===user.id)
            .sort((a,b)=>a.numeroPalpite-b.numeroPalpite);
          const total = meusPalpites.length;
          const podeAdicionar = total < LIMITE_PALPITES;

          return `
          <div class="sumula">
            <div class="sumula-head">
              <span class="comp">${escapeHtml(j.rodada||'')}</span>
              <span>${new Date(j.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <div class="sumula-body">
              <div class="sumula-team">${bandeira(j.mandanteSigla, j.mandante)}<div class="name">${escapeHtml(j.mandante)}</div></div>
              <div class="placar-box">
                <input type="number" min="0" class="placar-input font-mono" id="pm-${j.id}" placeholder="-">
                <span class="placar-sep">×</span>
                <input type="number" min="0" class="placar-input font-mono" id="pv-${j.id}" placeholder="-">
              </div>
              <div class="sumula-team">${bandeira(j.visitanteSigla, j.visitante)}<div class="name">${escapeHtml(j.visitante)}</div></div>
            </div>
            ${meusPalpites.length ? `
            <div style="padding:8px 14px;border-top:1px solid var(--linha);">
              <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--texto-3);margin-bottom:6px;">Meus palpites (${total}/${LIMITE_PALPITES})</div>
              ${meusPalpites.map(p=>{
                const pag = db.pagamentos.find(x=>x.palpiteId===p.id);
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--linha);font-size:12px;">
                  <span class="font-mono" style="color:var(--verde);font-weight:700;">${p.placarMandante} × ${p.placarVisitante}</span>
                  <span style="color:var(--texto-3);font-size:10.5px;">${escapeHtml(p.codigoVerificacao||'')}</span>
                  <span>${pag ? Pages._badgePagamento(pag.status) : ''}</span>
                </div>`;
              }).join('')}
            </div>` : ''}
            <div class="sumula-foot">
              <span style="font-size:11px;color:var(--texto-2);">${podeAdicionar ? `Aposte até ${LIMITE_PALPITES}x neste jogo` : `Limite de ${LIMITE_PALPITES} palpites atingido`}</span>
              ${podeAdicionar ? `<button class="btn btn-primary btn-sm" data-enviar="${j.id}">+ Apostar</button>` : ''}
            </div>
          </div>`;
        }).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">⚽</div><div class="msg">Nenhum jogo aberto para palpite no momento</div></div>`}
      </div>
    `;

    document.querySelectorAll('[data-enviar]').forEach(btn=>{
      btn.onclick = async () => {
        const jogoId = btn.dataset.enviar;
        const jogo = db.jogos.find(j=>j.id===jogoId);
        const pm = document.getElementById(`pm-${jogoId}`).value;
        const pv = document.getElementById(`pv-${jogoId}`).value;
        if(pm==='' || pv===''){ toast('Informe o placar dos dois times.', 'error'); return; }

        if(jogo && jogo.dataHora && Date.now() >= new Date(jogo.dataHora).getTime()){
          toast('Este jogo já começou — não é possível mais apostar.', 'error');
          return;
        }

        // Verifica limite no cliente antes de ir ao banco
        const jaFeitos = db.palpites.filter(p=>p.jogoId===jogoId && p.usuarioId===user.id).length;
        if(jaFeitos >= LIMITE_PALPITES){
          toast(`Limite de ${LIMITE_PALPITES} palpites por jogo atingido.`, 'error');
          return;
        }

        btn.disabled = true; btn.textContent = 'Enviando...';

        // Revalida no banco antes de inserir para evitar duplicata de clique duplo
        const { data: jaExistem, error: errCount } = await sb.from('palpites')
          .select('id')
          .eq('jogo_id', jogoId)
          .eq('usuario_id', user.id);

        const totalNoBanco = errCount ? jaFeitos : (jaExistem ? jaExistem.length : jaFeitos);

        if(totalNoBanco >= LIMITE_PALPITES){
          toast(`Limite de ${LIMITE_PALPITES} palpites por jogo atingido.`, 'error');
          btn.disabled = false; btn.textContent = '+ Apostar';
          return;
        }

        const { data, error } = await sb.from('palpites')
          .insert({
            jogo_id: jogoId,
            usuario_id: user.id,
            placar_mandante: parseInt(pm,10),
            placar_visitante: parseInt(pv,10),
            numero_palpite: totalNoBanco + 1,
          })
          .select()
          .single();

        if(error){
          const msg = error.message.includes('travado')
            ? 'Este jogo já começou — não é possível mais apostar.'
            : error.message.includes('max_palpites')
            ? `Limite de ${LIMITE_PALPITES} palpites por jogo atingido.`
            : (error.message.includes('duplicate') || error.message.includes('unique') || error.message.includes('palpite_unico'))
            ? `Você já enviou este palpite. Tente um placar diferente ou aguarde um instante.`
            : 'Erro ao enviar palpite: ' + error.message;
          toast(msg, 'error');
          btn.disabled = false; btn.textContent = '+ Apostar';
          return;
        }

        await Promise.all([Store.reloadPalpites(), Store.reloadPagamentos()]);
        const palpiteSalvo = Map_.palpite(data);
        const pagamentoVinculado = Store.data.pagamentos.find(p=>p.palpiteId===palpiteSalvo.id);
        Modals.comprovantePalpite(jogo, palpiteSalvo, pagamentoVinculado);
        renderAbertos();
      };
    });
  };
  const renderFinalizados = () => {
    document.getElementById('tab-content').innerHTML = `
      <div class="card card-flush">
        <table>
          <thead><tr><th>Jogo</th><th>Resultado</th><th>Meu palpite</th><th>Pontos</th></tr></thead>
          <tbody>
            ${jogosFinalizados.length ? jogosFinalizados.map(j=>{
              const meusPalpites = db.palpites.filter(p=>p.jogoId===j.id && p.usuarioId===user.id)
                .sort((a,b)=>a.numeroPalpite-b.numeroPalpite);
              if(!meusPalpites.length) return `<tr>
                <td>${escapeHtml(j.mandante)} × ${escapeHtml(j.visitante)}</td>
                <td class="font-mono">${j.placarMandante} × ${j.placarVisitante}</td>
                <td style="color:var(--texto-3);">não apostou</td>
                <td><span class="pts-pill">0 pts</span></td>
              </tr>`;
              return meusPalpites.map((p,i)=>`<tr>
                <td>${i===0?escapeHtml(j.mandante)+' × '+escapeHtml(j.visitante):'↳ aposta '+(i+1)}</td>
                <td class="font-mono">${i===0?j.placarMandante+' × '+j.placarVisitante:'—'}</td>
                <td class="font-mono" style="color:var(--verde);">${p.placarMandante} × ${p.placarVisitante}</td>
                <td><span class="pts-pill">${p.pontos||0} pts</span></td>
              </tr>`).join('');
            }).join('') : `<tr><td colspan="4"><div class="empty-state"><div class="msg">Nenhum resultado ainda</div></div></td></tr>`}
          </tbody>
        </table>
      </div>
    `;
  };
  renderAbertos();
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      if(t.dataset.tab==='abertos') renderAbertos(); else renderFinalizados();
    };
  });
};

  // Ordena: pendentes/em análise primeiro, depois pagos, mais recentes primeiro dentro de cada grupo
  const ordem = { pendente:0, atrasado:0, em_analise:1, pago:2, isento:2 };
  const ordenados = [...meus].sort((a,b)=> (ordem[a.status]??9) - (ordem[b.status]??9));

  document.getElementById('content').innerHTML = `
    <div class="grid grid-3">
      ${ordenados.length ? ordenados.map(p=>{

        return `
        <div class="card">
          <div class="flex-row" style="justify-content:space-between;">
            <div style="font-weight:700;color:var(--texto);font-size:13px;">${jogo ? escapeHtml(jogo.mandante)+' x '+escapeHtml(jogo.visitante) : 'Jogo removido'}</div>
            ${Pages._badgePagamento(p.status)}
          </div>
          ${palpite ? `<div class="text-muted" style="margin-top:2px;">Seu palpite: <span class="font-mono">${palpite.placarMandante} x ${palpite.placarVisitante}</span></div>` : ''}
          <div class="divider"></div>
          <div style="font-size:13px;display:flex;justify-content:space-between;margin-bottom:6px;"><span class="text-muted">Valor</span><span class="font-mono">${fmtMoney(p.valorInscricao)}</span></div>
          <div style="font-size:13px;display:flex;justify-content:space-between;"><span class="text-muted">Código do palpite</span><span class="font-mono" style="font-size:11px;">${escapeHtml(palpite?palpite.codigoVerificacao:'—')}</span></div>
          ${p.status==='pendente' || p.status==='atrasado' ? `<div class="divider"></div><button class="btn btn-primary btn-block btn-sm" data-pagar="${p.id}">Ver PIX e avisar que paguei</button>` : ''}
          ${p.status==='em_analise' ? `<div class="divider"></div><div class="text-muted" style="text-align:center;">Aguardando confirmação do administrador.</div>` : ''}
          ${jogo && jogo.status==='agendado' && (p.status==='pendente'||p.status==='atrasado'||p.status==='em_analise') ? `<div class="text-muted" style="margin-top:8px;font-size:11px;">⚠ Pague antes de ${new Date(jogo.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})} ou a aposta será cancelada.</div>` : ''}
        </div>`;
      }).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">$</div><div class="msg">Nenhum pagamento ainda</div><div class="hint">Envie um palpite em "Meus Palpites" para gerar seu primeiro pagamento.</div></div>`}
    </div>
  `;
  document.querySelectorAll('[data-pagar]').forEach(btn=>{
    btn.onclick = () => App.openModal('confirmar-pagamento-participante', meus.find(p=>p.id===btn.dataset.pagar));
  });
};

Pages.partPerfil = function(user){
  App.setTopbar('Meu Perfil', 'Atualize seus dados pessoais');
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:480px;">
      <form id="form-perfil">
        <div class="field"><label>Nome completo</label><input type="text" id="pf-nome" value="${escapeHtml(user.nome)}" required></div>
        <div class="field"><label>E-mail</label><input type="email" id="pf-email" value="${escapeHtml(user.email)}" required></div>
        <div class="field"><label>Telefone</label><input type="text" id="pf-telefone" value="${escapeHtml(user.telefone||'')}"></div>
        <div class="field"><label>Data de nascimento</label><input type="date" id="pf-nascimento" value="${user.nascimento||''}"></div>
        <div class="field"><label>Nova senha (deixe em branco para manter)</label><input type="password" id="pf-senha" placeholder="mínimo 6 caracteres" minlength="6"></div>
        <button type="submit" class="btn btn-primary" id="pf-submit">Salvar alterações</button>
      </form>
    </div>
  `;
  document.getElementById('form-perfil').onsubmit = async (e) => {
    e.preventDefault();
    const novoNome = document.getElementById('pf-nome').value.trim();
    const novoEmail = document.getElementById('pf-email').value.trim();
    const novoTelefone = document.getElementById('pf-telefone').value.trim();
    const novaNascimento = document.getElementById('pf-nascimento').value;
    const novaSenha = document.getElementById('pf-senha').value;

    const btn = document.getElementById('pf-submit');
    btn.disabled = true; btn.textContent = 'Salvando...';

    // 1. Dados de negócio (tabela perfis)
    const { error: perfilError } = await sb.from('perfis').update({
      nome: novoNome,
      telefone: novoTelefone,
      data_nascimento: novaNascimento || null,
    }).eq('id', user.id);

    if(perfilError){ toast('Erro ao salvar perfil: ' + perfilError.message, 'error'); btn.disabled=false; btn.textContent='Salvar alterações'; return; }

    // 2. E-mail e senha (Supabase Auth) — só envia o que mudou
    const authUpdate = {};
    if(novoEmail && novoEmail.toLowerCase() !== user.email.toLowerCase()) authUpdate.email = novoEmail;
    if(novaSenha) authUpdate.password = novaSenha;

    if(Object.keys(authUpdate).length > 0){
      const { error: authError } = await sb.auth.updateUser(authUpdate);
      if(authError){
        toast('Dados salvos, mas houve um erro ao atualizar e-mail/senha: ' + authError.message, 'error');
        btn.disabled=false; btn.textContent='Salvar alterações';
        await Session._loadProfile(user.id);
        return;
      }
      if(authUpdate.email) toast('Verifique seu e-mail para confirmar a alteração.', 'error');
    }

    await Session._loadProfile(user.id);
    toast('Perfil atualizado!');
    App.render();
  };
};

Pages.ranking = function(user){
  App.setTopbar('Ranking', 'Classificação geral dos participantes');
  const db = Store.data;
  const bolao = db.boloes.find(b=>b.status==='ativo') || db.boloes[0];

    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">★</div><div class="msg">Nenhum bolão cadastrado ainda</div></div>`;

  }
  let periodo = 'geral';
  const draw = () => {
    const linhas = Logic.rankingDoBolao(bolao.id, periodo);
    document.getElementById('content').innerHTML = `
      <div class="tabs">
        <div class="tab ${periodo==='geral'?'active':''}" data-p="geral">Geral</div>

          <thead><tr><th>#</th><th>Participante</th><th>Pontuação</th><th>Acertos</th><th>Erros</th><th>Aproveitamento</th></tr></thead>

            ${linhas.length ? linhas.map(l=>`
              <tr class="${l.posicao<=3?'rank-'+l.posicao:''}">

                <td style="font-weight:600;${user && l.usuario.id===user.id?'color:var(--amarelo);':''}">${escapeHtml(l.usuario.nome)}${user && l.usuario.id===user.id ? ' (você)' : ''}</td>

                  <div class="flex-row" style="gap:8px;">

                    <span class="font-mono" style="font-size:12px;">${l.aproveitamento}%</span>

        </table>
      </div>
    `;

Pages.sorteios = function(user){
  App.setTopbar('Sorteios & Rifas', 'Cotas, reservas e resultados de sorteios');
  const db = Store.data;
  const isAdmin = user.perfil === 'admin';

  if(isAdmin){
    document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" id="btn-novo-sorteio">+ Novo sorteio</button>`;
    document.getElementById('btn-novo-sorteio').onclick = () => App.openModal('sorteio-form', null);
  }

  document.getElementById('content').innerHTML = `
    <div class="grid grid-2">
      ${db.sorteios.length ? db.sorteios.map(s=>{
        const vendidas = s.cotas.filter(c=>c.status==='pago').length;
        const pct = Math.round((vendidas/s.totalCotas)*100);
        const vencedor = s.vencedor ? db.usuarios.find(u=>u.id===s.vencedor.usuarioId) : null;
        return `
        <div class="card">
          <div class="flex-row" style="justify-content:space-between;align-items:flex-start;">
            <div><div style="font-weight:700;color:var(--texto);">${escapeHtml(s.nome)}</div><div class="text-muted">${escapeHtml(s.descricao||'')}</div></div>
            <span class="badge-status ${s.status==='aberto'?'badge-ativo':'badge-inativo'}">${s.status}</span>
          </div>
          <div class="divider"></div>
          <div style="font-size:13px;display:flex;justify-content:space-between;margin-bottom:6px;"><span class="text-muted">Valor da cota</span><span class="font-mono">${fmtMoney(s.valorCota)}</span></div>
          <div style="font-size:13px;display:flex;justify-content:space-between;margin-bottom:8px;"><span class="text-muted">Sorteio em</span><span>${fmtDate(s.dataSorteio)}</span></div>
          <div class="progress-bar" style="margin-bottom:6px;"><div class="progress-fill" style="width:${pct}%;"></div></div>
          <div class="text-muted">${vendidas}/${s.totalCotas} cotas vendidas (${pct}%)</div>
          ${vencedor ? `<div class="divider"></div><div style="font-size:13px;background:rgba(212,165,55,0.12);padding:8px 10px;border-radius:6px;"><strong>🏆 Vencedor:</strong> cota nº ${s.vencedor.numero} — ${escapeHtml(vencedor.nome)}</div>` : ''}
          <div class="divider"></div>
          <div class="flex-row">
            <button class="btn btn-outline btn-sm" data-ver-cotas="${s.id}">Ver cotas</button>
            ${isAdmin && s.status==='aberto' ? `<button class="btn btn-secondary btn-sm" data-sortear="${s.id}">Realizar sorteio</button>` : ''}
            ${!isAdmin && s.status==='aberto' ? `<button class="btn btn-primary btn-sm" data-reservar="${s.id}">Reservar cota</button>` : ''}
          </div>
        </div>`;
      }).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">⊙</div><div class="msg">Nenhum sorteio cadastrado</div></div>`}
    </div>
  `;

  document.querySelectorAll('[data-ver-cotas]').forEach(btn=> btn.onclick = () => App.openModal('cotas-view', db.sorteios.find(s=>s.id===btn.dataset.verCotas)));
  document.querySelectorAll('[data-reservar]').forEach(btn=> btn.onclick = () => App.openModal('reservar-cota', db.sorteios.find(s=>s.id===btn.dataset.reservar)));
  document.querySelectorAll('[data-sortear]').forEach(btn=> btn.onclick = async () => {
    const s = db.sorteios.find(x=>x.id===btn.dataset.sortear);
    const pagas = s.cotas.filter(c=>c.status==='pago');
    if(pagas.length===0){ toast('Não há cotas pagas para sortear.', 'error'); return; }
    if(!confirm(`Realizar o sorteio "${s.nome}" agora? Esta ação é definitiva.`)) return;
    btn.disabled = true; btn.textContent = 'Sorteando...';
    const vencedor = await Logic.realizarSorteio(s.id);
    if(!vencedor){ toast('Não foi possível realizar o sorteio.', 'error'); btn.disabled=false; btn.textContent='Realizar sorteio'; return; }
    const u = Store.data.usuarios.find(x=>x.id===vencedor.usuarioId);
    Store.log(Session.currentUser().id, `Sorteio "${s.nome}" realizado. Vencedor: cota ${vencedor.numero} (${u?u.nome:'—'}).`);
    toast(`Sorteio realizado! Vencedor: cota nº ${vencedor.numero} (${u?u.nome:'—'})`);
    Pages.sorteios(user);
  });
};

      'reservar-cota': this.reservarCota,
      'cotas-view': this.cotasView,
      'confirmar-pagamento-participante': this.confirmarPagamentoParticipante,
    'ver-comprovante': this.verComprovante,
    };
    const fn = handlers[modal.type];
    if(!fn){ root.innerHTML=''; return; }
    fn.call(this, root, modal.payload);
  },

  _shell(root, title, bodyHtml, footHtml){
    root.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <div class="modal-head"><h3>${escapeHtml(title)}</h3><button class="modal-close" id="modal-close">×</button></div>
          <div class="modal-body">${bodyHtml}</div>
          ${footHtml ? `<div class="modal-foot">${footHtml}</div>` : ''}
        </div>
      </div>
    `;
    document.getElementById('modal-overlay').onclick = (e) => { if(e.target.id==='modal-overlay') App.closeModal(); };
    document.getElementById('modal-close').onclick = () => App.closeModal();
  },

  // ---------------- COMPROVANTE DE PALPITE ----------------
  // Chamado diretamente (não via App.openModal) logo após o palpite ser
  // salvo com sucesso no Supabase. Mostra o código de verificação e o
  // timestamp do servidor — o registro que resolve "eu disse que apostei X".
  comprovantePalpite(jogo, palpite, pagamento){
    const root = document.getElementById('modal-root');
    const dataFormatada = palpite.atualizadoEm
      ? new Date(palpite.atualizadoEm).toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'medium' })
      : new Date().toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'medium' });

    const cfg = Store.data.configuracao;
    const jaPago = pagamento && pagamento.status === 'pago';
    const temValor = pagamento && pagamento.valorInscricao > 0;

    this._shell(root, 'Palpite Confirmado', `
      <div style="text-align:center;padding:6px 0 4px;">
        <div style="font-size:13px;color:var(--texto-2);margin-bottom:14px;">
          ${escapeHtml(jogo.mandante)} <span class="font-mono">${palpite.placarMandante}</span> × <span class="font-mono">${palpite.placarVisitante}</span> ${escapeHtml(jogo.visitante)}
        </div>
        <div style="background:var(--bg-3);border:1.5px dashed var(--linha);border-radius:8px;padding:18px;margin-bottom:14px;">
          <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--texto-2);margin-bottom:6px;">Código de verificação</div>
          <div class="font-mono" style="font-size:24px;font-weight:700;color:var(--verde);letter-spacing:0.04em;">${escapeHtml(palpite.codigoVerificacao||'—')}</div>
        </div>
        <div style="font-size:12px;color:var(--texto-2);">Registrado em ${escapeHtml(dataFormatada)}</div>
      </div>

      ${temValor && !jaPago ? `
        <div class="divider"></div>
        <div style="background:var(--verde-bg);border-radius:8px;padding:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="font-size:12px;color:var(--texto-2);">Valor da aposta</span>
            <span class="font-mono" style="font-size:18px;font-weight:700;color:var(--verde);">${fmtMoney(pagamento.valorInscricao)}</span>
          </div>
          ${cfg.chavePix ? `
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:4px;">Chave PIX${cfg.nomeRecebedor ? ' — '+escapeHtml(cfg.nomeRecebedor) : ''}</div>
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;">
              <div class="font-mono" id="pix-key-text" style="flex:1;background:var(--bg);border:1px solid var(--linha);border-radius:6px;padding:8px 10px;font-size:13px;word-break:break-all;">${escapeHtml(cfg.chavePix)}</div>
              <button class="btn btn-secondary btn-sm" id="btn-copy-pix" type="button">Copiar</button>
            </div>
          ` : `<div class="text-muted" style="margin-bottom:10px;">O administrador ainda não cadastrou a chave PIX. Combine o pagamento diretamente com ele.</div>`}
          <div style="margin-top:4px;">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:6px;">Comprovante de pagamento</div>
            <label id="label-upload" style="display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px dashed var(--linha);border-radius:6px;padding:10px 12px;cursor:pointer;font-size:12px;color:var(--texto-2);">
              <span style="font-size:18px;">📎</span>
              <span id="upload-label-txt">Anexar foto do comprovante PIX</span>
              <input type="file" id="input-comprovante" accept="image/*" style="display:none;">
            </label>
            <div id="upload-preview" style="display:none;margin-top:8px;text-align:center;">
              <img id="preview-img" style="max-width:100%;max-height:180px;border-radius:6px;border:1px solid var(--linha);">
            </div>
          </div>
          <div style="font-size:11px;color:var(--texto-2);margin-top:10px;line-height:1.5;">
            Pague e anexe o comprovante antes do início do jogo.
          </div>
        </div>
      ` : ''}
      ${jaPago ? `<div style="text-align:center;color:var(--verde);font-weight:700;font-size:13px;margin-top:10px;">✓ Pagamento confirmado</div>` : ''}

      <div style="font-size:11.5px;color:var(--texto-3);margin-top:12px;line-height:1.5;text-align:center;">
        Guarde o código de verificação. Ele e o administrador consultam o mesmo registro —
        é a prova de qual placar você apostou e quando.
      </div>
    `, `<button class="btn btn-outline" id="modal-cancel">Fechar</button>${pagamento && pagamento.status !== 'pago' && pagamento.status !== 'em_analise' ? '<button class="btn btn-primary" id="btn-avisei">✓ Avisei que paguei</button>' : pagamento && pagamento.status === 'em_analise' ? '<span style="color:var(--amarelo);font-size:12px;font-weight:700;align-self:center;">⏳ Aguardando confirmação</span>' : ''}`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();

    const copyBtn = document.getElementById('btn-copy-pix');
    if(copyBtn){
      copyBtn.onclick = () => {
        const text = document.getElementById('pix-key-text').textContent;
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(()=> toast('Chave PIX copiada!')).catch(()=> toast('Não foi possível copiar. Copie manualmente.', 'error'));
        } else {
          toast('Copie a chave manualmente: ' + text, 'error');
        }
      };
    }

    // Preview da imagem antes do upload
    const inputComp = document.getElementById('input-comprovante');
    if(inputComp){
      inputComp.onchange = () => {
        const file = inputComp.files[0];
        if(!file) return;
        document.getElementById('upload-label-txt').textContent = file.name;
        const reader = new FileReader();
        reader.onload = e => {
          const prev = document.getElementById('upload-preview');
          document.getElementById('preview-img').src = e.target.result;
          prev.style.display = 'block';
        };
        reader.readAsDataURL(file);
      };
    }

    const aviseiBtn = document.getElementById('btn-avisei');
    if(aviseiBtn){
      aviseiBtn.onclick = async () => {
        aviseiBtn.disabled = true; aviseiBtn.textContent = 'Enviando...';

        const file = inputComp && inputComp.files[0];
        let comprovanteUrl = null;

        // Faz upload da imagem se foi selecionada
        if(file){
          const ext = file.name.split('.').pop();
          const path = `${Session.currentUser().id}/${pagamento.id}.${ext}`;
          const { error: upErr } = await sb.storage.from('comprovantes').upload(path, file, { upsert: true });
          if(upErr){
            toast('Erro ao enviar imagem: ' + upErr.message, 'error');
            aviseiBtn.disabled = false; aviseiBtn.textContent = '✓ Avisei que paguei';
            return;
          }
          comprovanteUrl = path;
        }

        const update = { forma_pagamento: 'PIX', status: 'em_analise' };
        if(comprovanteUrl) update.comprovante_url = comprovanteUrl;

        const { error } = await sb.from('pagamentos').update(update).eq('id', pagamento.id);
        if(error){
          toast('Erro ao enviar aviso: ' + error.message, 'error');
          aviseiBtn.disabled = false; aviseiBtn.textContent = '✓ Avisei que paguei';
          return;
        }
        Store.log(Session.currentUser().id, 'Participante avisou pagamento' + (comprovanteUrl ? ' com comprovante.' : '.'));
        toast(file ? 'Comprovante enviado! Aguarde a confirmação.' : 'Aviso enviado! Aguarde a confirmação.');
        await Store.reloadPagamentos();
        aviseiBtn.textContent = '⏳ Aguardando confirmação';
        aviseiBtn.disabled = true;
        aviseiBtn.className = 'btn btn-outline';
      };
    }
  },

        ({ error } = await sb.from('pagamentos').insert(linha));
      }
      if(error){ toast('Erro ao salvar pagamento: ' + error.message, 'error'); btn.disabled=false; btn.textContent=editing?'Salvar':'Registrar'; return; }

      Store.log(Session.currentUser().id, editing ? 'Pagamento editado.' : 'Pagamento registrado.');
      toast(editing ? 'Pagamento atualizado!' : 'Pagamento registrado!');
      await Store.reloadPagamentos();
      App.closeModal();
      Pages.adminPagamentos();
    };
  },

  // ---------------- CONFIRMAR PAGAMENTO (PARTICIPANTE) ----------------
  confirmarPagamentoParticipante(root, pagamento){
    const cfg = Store.data.configuracao;
    this._shell(root, 'Pagar via PIX', `
      <div style="background:var(--bg-3);border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:4px;">Valor da aposta</div>
        <div class="font-mono" style="font-size:22px;font-weight:700;color:var(--verde);">${fmtMoney(pagamento.valorInscricao)}</div>
      </div>
      ${cfg.chavePix ? `
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:4px;">Chave PIX${cfg.nomeRecebedor ? ' — '+escapeHtml(cfg.nomeRecebedor) : ''}</div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;">
          <div class="font-mono" id="pix-key-text-2" style="flex:1;background:var(--bg);border:1px solid var(--linha);border-radius:6px;padding:8px 10px;font-size:13px;word-break:break-all;">${escapeHtml(cfg.chavePix)}</div>
          <button class="btn btn-secondary btn-sm" id="btn-copy-pix-2" type="button">Copiar</button>
        </div>
      ` : `<p class="text-muted" style="margin-bottom:14px;">O administrador ainda não cadastrou a chave PIX. Combine o pagamento diretamente com ele.</p>`}
      <p style="font-size:12.5px;color:var(--texto-2);">Depois de pagar, clica em "Avisar que paguei" para o administrador confirmar o recebimento.</p>
    `, `<button class="btn btn-outline" id="modal-cancel">Cancelar</button><button class="btn btn-primary" id="modal-save">Avisar que paguei</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();

    const copyBtn = document.getElementById('btn-copy-pix-2');
    if(copyBtn){
      copyBtn.onclick = () => {
        const text = document.getElementById('pix-key-text-2').textContent;
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(()=> toast('Chave PIX copiada!')).catch(()=> toast('Não foi possível copiar. Copie manualmente.', 'error'));
        } else {
          toast('Copie a chave manualmente: ' + text, 'error');
        }
      };
    }

    document.getElementById('modal-save').onclick = async () => {
      const btn = document.getElementById('modal-save');
      btn.disabled = true; btn.textContent = 'Enviando...';

      const { error } = await sb.from('pagamentos').update({
        forma_pagamento: 'PIX',
        status: 'em_analise',
      }).eq('id', pagamento.id);

      if(error){ toast('Erro ao avisar pagamento: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Avisar que paguei'; return; }

      Store.log(Session.currentUser().id, 'Participante avisou pagamento da inscrição (aguardando confirmação do admin).');
      toast('Aviso enviado! Aguarde a confirmação do administrador.');
      await Store.reloadPagamentos();
      App.closeModal();
      Pages.partPagamentos(Session.currentUser());
    };
  },

  // ---------------- SORTEIO ----------------
  sorteioForm(root){
    this._shell(root, 'Novo Sorteio / Rifa', `
      <form id="f-sorteio">
        <div class="field"><label>Nome do sorteio</label><input type="text" id="s-nome" required></div>
        <div class="field"><label>Descrição</label><textarea id="s-desc" rows="2"></textarea></div>
        <div class="grid grid-2">
          <div class="field"><label>Valor da cota (R$)</label><input type="number" min="0" step="0.01" id="s-valor" required></div>
          <div class="field"><label>Total de cotas</label><input type="number" min="1" id="s-total" value="50" required></div>
        </div>
        <div class="field"><label>Data do sorteio</label><input type="date" id="s-data"></div>
      </form>
    `, `<button class="btn btn-outline" id="modal-cancel">Cancelar</button><button class="btn btn-primary" id="modal-save">Criar sorteio</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();
    document.getElementById('modal-save').onclick = async () => {
      const nome = document.getElementById('s-nome').value.trim();
      if(!nome){ toast('Informe o nome do sorteio.', 'error'); return; }
      const linha = {
        nome,
        descricao: document.getElementById('s-desc').value.trim(),
        valor_cota: parseFloat(document.getElementById('s-valor').value||0),
        total_cotas: parseInt(document.getElementById('s-total').value||1,10),
        data_sorteio: document.getElementById('s-data').value || null,
        status: 'aberto',
      };
      const btn = document.getElementById('modal-save');
      btn.disabled = true; btn.textContent = 'Criando...';

      const { error } = await sb.from('sorteios').insert(linha);
      if(error){ toast('Erro ao criar sorteio: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Criar sorteio'; return; }

      Store.log(Session.currentUser().id, `Sorteio "${nome}" criado.`);
      toast('Sorteio criado!');
      await Store.reloadSorteios();
      App.closeModal();
      Pages.sorteios(Session.currentUser());
    };
  },

  // ---------------- VER COTAS ----------------
  cotasView(root, sorteio){
    const db = Store.data;
    const grid = [];
    for(let i=1;i<=sorteio.totalCotas;i++){
      const cota = sorteio.cotas.find(c=>c.numero===i);
      grid.push({ numero:i, cota });
    }
    this._shell(root, `Cotas — ${sorteio.nome}`, `
      <div class="flex-row" style="margin-bottom:12px;gap:14px;font-size:12px;">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--azul);border-radius:2px;margin-right:4px;"></span>Pago</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--amarelo);border-radius:2px;margin-right:4px;"></span>Reservado</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--bg-3);border:1px solid var(--linha);border-radius:2px;margin-right:4px;"></span>Livre</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px;">
        ${grid.map(g=>{
          let bg='var(--bg-3)', tip='Livre';
          if(g.cota){
            const u = db.usuarios.find(x=>x.id===g.cota.usuarioId);
            tip = (u?u.nome:'—') + ' — ' + g.cota.status;
            bg = g.cota.status==='pago' ? 'var(--azul)' : 'var(--amarelo)';
          }
          const color = g.cota ? '#fff' : 'var(--texto-2)';
          return `<div title="${escapeHtml(tip)}" class="font-mono" style="background:${bg};color:${color};border-radius:4px;text-align:center;padding:6px 0;font-size:11px;font-weight:700;${!g.cota?'border:1px solid var(--linha);':''}">${g.numero}</div>`;
        }).join('')}
      </div>
    `, `<button class="btn btn-outline" id="modal-cancel">Fechar</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();
  },

  // ---------------- RESERVAR COTA (PARTICIPANTE) ----------------
  reservarCota(root, sorteio){
    const livres = Logic.cotasDisponiveis(sorteio);
    this._shell(root, `Reservar cota — ${sorteio.nome}`, `
      ${livres.length ? `
      <div class="field"><label>Número da cota</label>
        <select id="r-numero">${livres.map(n=>`<option value="${n}">Cota nº ${n}</option>`).join('')}</select>
      </div>
      <div class="text-muted">Valor: <strong class="font-mono">${fmtMoney(sorteio.valorCota)}</strong>. A cota ficará reservada até a confirmação do pagamento pelo administrador.</div>
      ` : `<div class="empty-state"><div class="msg">Todas as cotas já foram reservadas ou vendidas</div></div>`}
    `, livres.length ? `<button class="btn btn-outline" id="modal-cancel">Cancelar</button><button class="btn btn-primary" id="modal-save">Reservar</button>` : `<button class="btn btn-outline" id="modal-cancel">Fechar</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();
    const saveBtn = document.getElementById('modal-save');
    if(saveBtn) saveBtn.onclick = async () => {
      const numero = parseInt(document.getElementById('r-numero').value,10);
      const user = Session.currentUser();
      saveBtn.disabled = true; saveBtn.textContent = 'Reservando...';

      const { error } = await sb.from('cotas').insert({
        sorteio_id: sorteio.id,
        numero,
        usuario_id: user.id,
        status: 'reservado',
      });

      if(error){
        const msg = error.message && error.message.includes('duplicate')
          ? 'Essa cota já foi reservada por outra pessoa — escolha outra.'
          : 'Erro ao reservar cota: ' + error.message;
        toast(msg, 'error');
        saveBtn.disabled = false; saveBtn.textContent = 'Reservar';
        return;
      }

      Store.log(user.id, `Reservou a cota nº ${numero} do sorteio "${sorteio.nome}".`);
      toast(`Cota nº ${numero} reservada! Aguarde confirmação de pagamento.`);
      await Store.reloadSorteios();
      App.closeModal();
      Pages.sorteios(user);
    };
  },
};


</script>
</body>
</html>
