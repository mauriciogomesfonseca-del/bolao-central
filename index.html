// ---- RESOLUÇÃO DO CHAVEAMENTO DO MATA-MATA --------------------------------
// Junta todas as fases num único lugar para facilitar a busca por id.
function copaTodosJogosMataMata(){
  return [
    ...COPA_2026,
    ...COPA_2026_OITAVAS,
    ...COPA_2026_QUARTAS,
    ...COPA_2026_SEMIS,
    ...COPA_2026_FINAIS,
  ];
}
function copaJogoPorId(id){
  return copaTodosJogosMataMata().find(j=>j.id===id) || null;
}
// Resolve um "lado" de um confronto: pode ser um time fixo (time1/nome1 já preenchidos)
// ou pode depender do vencedor (ou perdedor, para o 3º lugar) de um jogo anterior.
// Retorna { sigla, nome, definido, label } — label é o texto a mostrar quando ainda não definido.
function copaResolveLado(jogo, lado){
  // lado = 1 ou 2
  const siglaKey = 'time'+lado, nomeKey = 'nome'+lado;
  if(jogo[siglaKey]) return { sigla:jogo[siglaKey], nome:jogo[nomeKey], definido:true };

  const origemKey = lado===1 ? 'origem1' : 'origem2';
  const origemPerdedorKey = lado===1 ? 'origemPerdedor1' : 'origemPerdedor2';
  const queremosPerdedor = !!jogo[origemPerdedorKey];
  const origemId = jogo[origemKey] || jogo[origemPerdedorKey];
  if(!origemId) return { sigla:null, nome:'A definir', definido:false, label:'A definir' };

  const jogoOrigem = copaJogoPorId(origemId);
  if(!jogoOrigem) return { sigla:null, nome:'A definir', definido:false, label:'A definir' };

  const ladoA = copaResolveLado(jogoOrigem, 1);
  const ladoB = copaResolveLado(jogoOrigem, 2);

  // Se o jogo de origem já tem um vencedor calculado (placar preenchido), usa o time real.
  const vencedor = copaVencedorJogo(jogoOrigem);
  if(vencedor){
    const perdedor = vencedor.sigla === ladoA.sigla ? ladoB : ladoA;
    const alvo = queremosPerdedor ? perdedor : vencedor;
    return { sigla:alvo.sigla, nome:alvo.nome, definido:true };
  }

  // Ainda não definido: monta o texto "Vencedor de X x Y" (ou "Perdedor de X x Y")
  const nomeA = ladoA.definido ? ladoA.nome : ladoA.label;
  const nomeB = ladoB.definido ? ladoB.nome : ladoB.label;
  const prefixo = queremosPerdedor ? 'Perdedor de' : 'Vencedor de';
  return { sigla:null, nome:null, definido:false, label:`${prefixo} ${nomeA} x ${nomeB}` };
}
// Retorna {sigla, nome} do vencedor de um jogo, ou null se ainda não há placar definido.
function copaVencedorJogo(jogo){
  const ladoA = copaResolveLado(jogo, 1);
  const ladoB = copaResolveLado(jogo, 2);
  if(!ladoA.definido || !ladoB.definido) return null;
  if(jogo.placar1==null || jogo.placar2==null) return null;
  if(jogo.placar1 > jogo.placar2) return { sigla:ladoA.sigla, nome:ladoA.nome };
  if(jogo.placar2 > jogo.placar1) return { sigla:ladoB.sigla, nome:ladoB.nome };
  // empate sem pênaltis registrados ainda não define vencedor
  if(jogo.penaltis1!=null && jogo.penaltis2!=null){
    if(jogo.penaltis1 > jogo.penaltis2) return { sigla:ladoA.sigla, nome:ladoA.nome };
    if(jogo.penaltis2 > jogo.penaltis1) return { sigla:ladoB.sigla, nome:ladoB.nome };
  }
  return null;
}
// Monta um card visual de confronto (jogo já decidido ou ainda "Vencedor de X x Y").
function copaCardConfronto(jogo, hoje){
  const ladoA = copaResolveLado(jogo, 1);
  const ladoB = copaResolveLado(jogo, 2);
  const dt = jogo.hora ? new Date(jogo.data+'T'+jogo.hora) : new Date(jogo.data+'T12:00');
  const label = dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + (jogo.hora ? ' · '+jogo.hora : '');
  const isBra = ladoA.sigla==='BRA' || ladoB.sigla==='BRA';
  const jaPassou = dt < hoje;
  const nomeA = ladoA.definido ? ladoA.nome : ladoA.label;
  const nomeB = ladoB.definido ? ladoB.nome : ladoB.label;
  const bandeiraA = ladoA.definido ? bandeiraCss(ladoA.sigla, ladoA.nome) : '<span style="font-size:18px;">❓</span>';
  const bandeiraB = ladoB.definido ? bandeiraCss(ladoB.sigla, ladoB.nome) : '<span style="font-size:18px;">❓</span>';
  return `<div style="background:rgba(255,255,255,0.04);border:1px solid ${isBra?'rgba(255,215,0,0.4)':'rgba(255,255,255,0.08)'};border-radius:8px;padding:10px;${jaPassou?'opacity:0.55;':''}">
    <div style="font-size:10px;color:${isBra?'#FFD700':'var(--texto-3)'};margin-bottom:6px;font-weight:700;">${jogo.fase||''} · ${label}</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
      <div style="text-align:center;max-width:90px;"><div style="font-size:22px;">${bandeiraA}</div><div style="font-size:${ladoA.definido?'10px':'9px'};font-weight:700;margin-top:3px;line-height:1.25;">${escapeHtml(nomeA)}</div></div>
      <div style="font-size:11px;color:var(--texto-3);font-weight:700;">VS</div>
      <div style="text-align:center;max-width:90px;"><div style="font-size:22px;">${bandeiraB}</div><div style="font-size:${ladoB.definido?'10px':'9px'};font-weight:700;margin-top:3px;line-height:1.25;">${escapeHtml(nomeB)}</div></div>
    </div>
    <div style="font-size:10px;color:var(--texto-3);text-align:center;margin-top:6px;">${escapeHtml(jogo.cidade||'')}</div>
  </div>`;
}

// Retorna os próximos N confrontos (de qualquer fase, em ordem cronológica) a partir de "hoje".
// Usado no card resumido do dashboard para nunca ficar vazio enquanto o mata-mata não terminar.
function copaProximosConfrontos(hoje, limite){
  return copaTodosJogosMataMata()
    .filter(j=>{
      const dt = j.hora ? new Date(j.data+'T'+j.hora) : new Date(j.data+'T23:59');
      return dt >= hoje;
    })
    .sort((a,b)=>{
      const da = a.hora ? new Date(a.data+'T'+a.hora) : new Date(a.data+'T23:59');
      const db = b.hora ? new Date(b.data+'T'+b.hora) : new Date(b.data+'T23:59');
      return da-db;
    })
    .slice(0, limite);
}

    }).join('');
    return `
    <div class="card card-flush" style="margin-bottom:12px;${isBrasilGrupo?'border:1px solid rgba(255,215,0,0.3);':''}">
      <div style="padding:8px 14px;background:var(--bg-3);border-bottom:1px solid var(--linha);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;">
        <span>Grupo ${g.grupo}</span>

  // Próximos jogos da fase atual (16 avos / fase eliminatória inicial)
  const proxJogos16 = COPA_2026.filter(j=> new Date(j.data+'T'+j.hora) >= hoje)

  function secaoFase(titulo, jogos){

  const secaoQuartas = secaoFase('QUARTAS DE FINAL · 9 a 11 de julho', COPA_2026_QUARTAS);
  const secaoSemis   = secaoFase('SEMIFINAIS · 14 e 15 de julho', COPA_2026_SEMIS);
  const secaoFinais  = secaoFase('3º LUGAR (18/07) E FINAL (19/07)', COPA_2026_FINAIS);

  document.getElementById('content').innerHTML = `

        <div style="font-size:11px;color:var(--texto-3);">EUA • México • Canadá · Fase de grupos encerrada</div>
      </div>
    </div>
    ${cardProximos}
    ${secaoOitavas}
    ${secaoQuartas}
    ${secaoSemis}
    ${secaoFinais}
    <div style="font-size:12px;color:var(--texto-3);margin-bottom:12px;font-weight:700;">TABELA DE GRUPOS <span style="color:var(--verde);margin-left:8px;">● classificado</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">
      ${tabela}
    </div>
  `;
};

Pages.partTurma = async function(user){
  App.setTopbar('A Turma', 'Veja os participantes e os palpites de cada jogo');
  document.getElementById('content').innerHTML = '<div class="empty-state"><div class="msg">Carregando...</div></div>';
  await Promise.all([Store.reloadPalpites(), Store.reloadUsuarios(), Store.reloadJogos()]);
  const db = Store.data;
  const bolao = db.boloes.find(b=>b.status==='ativo') || db.boloes[0];
  if(!bolao){
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">👥</div><div class="msg">Nenhum bolão ativo</div></div>`;
    return;
  }

  const participantes = db.usuarios.filter(u=>u.perfil==='participante');
  const jogos = db.jogos.filter(j=>j.bolaoId===bolao.id).sort((a,b)=>new Date(a.dataHora)-new Date(b.dataHora));
  const ranking = Logic.rankingDoBolao(bolao.id,'geral');

  // Card de participantes
  const cardPart = `
    <div class="card" style="margin-bottom:18px;">
      <div class="section-title" style="margin-bottom:12px;">👥 Participantes (${participantes.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${participantes.map(u=>{
          const r = ranking.find(x=>x.usuario.id===u.id);
          const isMe = u.id === user.id;
          return `<div style="display:flex;align-items:center;gap:8px;background:var(--bg-3);border-radius:8px;padding:8px 12px;${isMe?'border:1.5px solid var(--azul);':''}">
            <span style="width:28px;height:28px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${u.nome.charAt(0).toUpperCase()}</span>
            <div>
              <div style="font-size:13px;font-weight:${isMe?'700':'600'};">${escapeHtml(u.nome)}${isMe?' (você)':''}</div>
              <div style="font-size:11px;color:var(--texto-3);">${r ? '#'+r.posicao+' · '+r.pontuacao+' pts' : '0 pts'}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // Cards por jogo
  const cardsJogos = jogos.length ? jogos.map(j=>{
    const finalizado = j.status === 'finalizado';
    const emAndamento = j.status === 'em_andamento';
    const temResultado = j.placarMandante !== null && j.placarVisitante !== null;
    const palpitesDoJogo = db.palpites.filter(p=>p.jogoId===j.id);
    const qtdApostaram = [...new Set(palpitesDoJogo.map(p=>p.usuarioId))].length;

    const statusLabel = finalizado
      ? `<span data-placar-jogo="${j.id}" style="color:var(--azul-2);font-size:12px;font-weight:700;">✓ ${j.placarMandante} × ${j.placarVisitante}</span>`
      : emAndamento
      ? `<span data-placar-jogo="${j.id}" style="display:inline-flex;align-items:center;gap:6px;"><span class="live-badge"><span class="pulse"></span>Ao vivo</span><strong style="color:var(--verde);font-size:13px;">${j.placarMandante ?? 0} × ${j.placarVisitante ?? 0}</strong></span>`
      : j.dataHora && new Date(j.dataHora) <= new Date()
      ? `<span class="live-badge"><span class="pulse"></span>Ao vivo</span>`
      : `<span style="color:var(--texto-3);font-size:12px;">${j.dataHora ? new Date(j.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : 'sem data'}</span>`;

    const linhasParticipantes = participantes.map(u=>{
      const meus = palpitesDoJogo.filter(p=>p.usuarioId===u.id).sort((a,b)=>a.numeroPalpite-b.numeroPalpite);
      const isMe = u.id === user.id;

      if(!meus.length) return `<tr style="${isMe?'background:rgba(var(--azul-rgb,59,130,246),0.06);':''}">
        <td style="font-weight:${isMe?'700':'500'};">${escapeHtml(u.nome)}${isMe?' 👤':''}</td>
        <td colspan="2" style="color:var(--texto-3);font-size:12px;">— não apostou</td>
      </tr>`;

      return meus.map((p,i)=>{
        // Mostra palpites de todos em tempo real
        const revelar = true;
        const pts = p.pontos || 0;
        const corPts = pts > 0 ? 'var(--verde)' : 'var(--vermelho,#ef4444)';
        return `<tr style="${isMe?'background:rgba(59,130,246,0.06);':''}">
          <td style="font-weight:${isMe?'700':'500'};">${i===0 ? escapeHtml(u.nome)+(isMe?' 👤':'') : ''}</td>
          <td class="font-mono" style="font-weight:700;color:${revelar?'var(--verde)':'var(--texto-3)'};">
            ${revelar ? p.placarMandante+' × '+p.placarVisitante : '🔒 Em sigilo'}
          </td>
          <td>${temResultado && revelar ? `<span class="font-mono" style="color:${corPts};font-weight:700;">${pts} pts</span>` : ''}</td>
        </tr>`;
      }).join('');
    }).join('');

    return `
    <div class="card card-flush" style="margin-bottom:14px;">
      <div style="padding:10px 16px;background:var(--bg-3);border-bottom:1px solid var(--linha);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
        <span style="font-weight:700;">${escapeHtml(j.mandante)} × ${escapeHtml(j.visitante)}</span>
        <div style="display:flex;gap:10px;align-items:center;">
          <span style="font-size:12px;color:var(--texto-3);">${qtdApostaram}/${participantes.length} apostaram</span>
          ${statusLabel}
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Participante</th><th>Palpite</th><th>${finalizado?'Pontos':''}</th></tr></thead>
          <tbody>${linhasParticipantes}</tbody>
        </table>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state"><div class="icon">⚽</div><div class="msg">Nenhum jogo cadastrado</div></div>`;

  document.getElementById('content').innerHTML = cardPart + cardsJogos;
};

Pages.partPalpites = function(user){
  App.setTopbar('Meus Palpites', 'Informe o placar antes do início de cada partida');
  const db = Store.data;
  const LIMITE_PALPITES = 3;
  const jogosAgendados = db.jogos.filter(j=>j.status==='agendado').sort((a,b)=>new Date(a.dataHora)-new Date(b.dataHora));
  const jogosFinalizados = db.jogos.filter(j=>j.status==='finalizado').sort((a,b)=>new Date(b.dataHora)-new Date(a.dataHora));

  document.getElementById('content').innerHTML = `
    <div class="tabs">
      <div class="tab active" data-tab="abertos">Abertos para palpite</div>
      <div class="tab" data-tab="finalizados">Resultados &amp; meus pontos</div>
    </div>
    <div id="tab-content"></div>
  `;

  const renderAbertos = () => {
    document.getElementById('tab-content').innerHTML = `
      <div class="grid grid-3">
        ${jogosAgendados.length ? jogosAgendados.map(j=>{
          const meusPalpites = db.palpites.filter(p=>p.jogoId===j.id && p.usuarioId===user.id)
            .sort((a,b)=>a.numeroPalpite-b.numeroPalpite);
          const total = meusPalpites.length;
          const podeAdicionar = total < LIMITE_PALPITES;

          return `
          <div class="sumula">
            <div class="sumula-head">
              <span class="comp">${escapeHtml(j.rodada||'')}</span>
              <span>${new Date(j.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <div class="sumula-body">
              <div class="sumula-team">${bandeira(j.mandanteSigla, j.mandante)}<div class="name">${escapeHtml(j.mandante)}</div></div>
              <div class="placar-box">
                <input type="number" min="0" class="placar-input font-mono" id="pm-${j.id}" placeholder="-">
                <span class="placar-sep">×</span>
                <input type="number" min="0" class="placar-input font-mono" id="pv-${j.id}" placeholder="-">
              </div>
              <div class="sumula-team">${bandeira(j.visitanteSigla, j.visitante)}<div class="name">${escapeHtml(j.visitante)}</div></div>
            </div>
            ${meusPalpites.length ? `
            <div style="padding:8px 14px;border-top:1px solid var(--linha);">
              <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--texto-3);margin-bottom:6px;">Meus palpites (${total}/${LIMITE_PALPITES})</div>
              ${meusPalpites.map(p=>{
                const pag = db.pagamentos.find(x=>x.palpiteId===p.id);
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--linha);font-size:12px;">
                  <span class="font-mono" style="color:var(--verde);font-weight:700;">${p.placarMandante} × ${p.placarVisitante}</span>
                  <span style="color:var(--texto-3);font-size:10.5px;">${escapeHtml(p.codigoVerificacao||'')}</span>
                  <span>${pag ? Pages._badgePagamento(pag.status) : ''}</span>
                </div>`;
              }).join('')}
            </div>` : ''}
            <div class="sumula-foot">
              <span style="font-size:11px;color:var(--texto-2);">${podeAdicionar ? `Aposte até ${LIMITE_PALPITES}x neste jogo` : `Limite de ${LIMITE_PALPITES} palpites atingido`}</span>
              ${podeAdicionar ? `<button class="btn btn-primary btn-sm" data-enviar="${j.id}">+ Apostar</button>` : ''}
            </div>
          </div>`;
        }).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">⚽</div><div class="msg">Nenhum jogo aberto para palpite no momento</div></div>`}
      </div>
    `;

    // Flag global por jogo para evitar envio duplo mesmo com cliques rápidos
    const _enviando = {};

    document.querySelectorAll('[data-enviar]').forEach(btn=>{
      btn.onclick = async () => {
        const jogoId = btn.dataset.enviar;

        // Trava imediata antes de qualquer await — impede race condition
        if(_enviando[jogoId]) return;
        _enviando[jogoId] = true;

        const jogo = db.jogos.find(j=>j.id===jogoId);
        const pm = document.getElementById(`pm-${jogoId}`).value;
        const pv = document.getElementById(`pv-${jogoId}`).value;

        const liberar = () => {
          _enviando[jogoId] = false;
          btn.disabled = false; btn.textContent = '+ Apostar';
        };

        if(pm==='' || pv===''){ toast('Informe o placar dos dois times.', 'error'); liberar(); return; }

        if(jogo && jogo.dataHora && Date.now() >= new Date(jogo.dataHora).getTime()){
          toast('Este jogo já começou — não é possível mais apostar.', 'error'); liberar(); return;
        }

        // Verifica limite no cliente antes de ir ao banco
        const jaFeitos = db.palpites.filter(p=>p.jogoId===jogoId && p.usuarioId===user.id).length;
        if(jaFeitos >= LIMITE_PALPITES){
          toast(`Limite de ${LIMITE_PALPITES} palpites por jogo atingido.`, 'error'); liberar(); return;
        }

        btn.disabled = true; btn.textContent = 'Enviando...';

        // Busca contagem real no banco (fonte da verdade)
        const { data: jaExistem } = await sb.from('palpites')
          .select('id')
          .eq('jogo_id', jogoId)
          .eq('usuario_id', user.id);

        const totalNoBanco = jaExistem ? jaExistem.length : jaFeitos;

        if(totalNoBanco >= LIMITE_PALPITES){
          toast(`Limite de ${LIMITE_PALPITES} palpites por jogo atingido.`, 'error'); liberar(); return;
        }

        const { data, error } = await sb.from('palpites')
          .insert({
            jogo_id: jogoId,
            usuario_id: user.id,
            placar_mandante: parseInt(pm,10),
            placar_visitante: parseInt(pv,10),
            numero_palpite: totalNoBanco + 1,
          })
          .select()
          .single();

        if(error){
          const msg = error.message.includes('travado')
            ? 'Este jogo já começou — não é possível mais apostar.'
            : error.message.includes('max_palpites')
            ? `Limite de ${LIMITE_PALPITES} palpites por jogo atingido.`
            : (error.message.includes('duplicate') || error.message.includes('unique') || error.message.includes('palpite_unico'))
            ? `Palpite duplicado detectado. Aguarde um instante e tente novamente.`
            : 'Erro ao enviar palpite: ' + error.message;
          toast(msg, 'error'); liberar(); return;
        }

        _enviando[jogoId] = false; // libera a flag (não reabilita btn pois renderAbertos recria tudo)
        await Promise.all([Store.reloadPalpites(), Store.reloadPagamentos()]);
        const palpiteSalvo = Map_.palpite(data);
        const pagamentoVinculado = Store.data.pagamentos.find(p=>p.palpiteId===palpiteSalvo.id);
        Modals.comprovantePalpite(jogo, palpiteSalvo, pagamentoVinculado);
        renderAbertos();
      };
    });
  };
  const renderFinalizados = () => {
    document.getElementById('tab-content').innerHTML = `
      <div class="card card-flush">
        <table>
          <thead><tr><th>Jogo</th><th>Resultado</th><th>Meu palpite</th><th>Pontos</th></tr></thead>
          <tbody>
            ${jogosFinalizados.length ? jogosFinalizados.map(j=>{
              const meusPalpites = db.palpites.filter(p=>p.jogoId===j.id && p.usuarioId===user.id)
                .sort((a,b)=>a.numeroPalpite-b.numeroPalpite);
              if(!meusPalpites.length) return `<tr>
                <td>${escapeHtml(j.mandante)} × ${escapeHtml(j.visitante)}</td>
                <td class="font-mono">${j.placarMandante} × ${j.placarVisitante}</td>
                <td style="color:var(--texto-3);">não apostou</td>
                <td><span class="pts-pill">0 pts</span></td>
              </tr>`;
              return meusPalpites.map((p,i)=>`<tr>
                <td>${i===0?escapeHtml(j.mandante)+' × '+escapeHtml(j.visitante):'↳ aposta '+(i+1)}</td>
                <td class="font-mono">${i===0?j.placarMandante+' × '+j.placarVisitante:'—'}</td>
                <td class="font-mono" style="color:var(--verde);">${p.placarMandante} × ${p.placarVisitante}</td>
                <td><span class="pts-pill">${p.pontos||0} pts</span></td>
              </tr>`).join('');
            }).join('') : `<tr><td colspan="4"><div class="empty-state"><div class="msg">Nenhum resultado ainda</div></div></td></tr>`}
          </tbody>
        </table>
      </div>
    `;
  };
  renderAbertos();
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      if(t.dataset.tab==='abertos') renderAbertos(); else renderFinalizados();
    };
  });
};

Pages.partPerfil = function(user){
  App.setTopbar('Meu Perfil', 'Atualize seus dados pessoais');
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:480px;">
      <form id="form-perfil">
        <div class="field"><label>Nome completo</label><input type="text" id="pf-nome" value="${escapeHtml(user.nome)}" required></div>
        <div class="field"><label>Celular</label><input type="tel" id="pf-telefone" value="${escapeHtml(user.telefone||'')}" placeholder="(00) 00000-0000"></div>
        <div class="field"><label>Data de nascimento</label><input type="date" id="pf-nascimento" value="${user.nascimento||''}"></div>
        <div class="field"><label>Nova senha (deixe em branco para manter)</label><input type="password" id="pf-senha" placeholder="mínimo 6 caracteres" minlength="6"></div>
        <button type="submit" class="btn btn-primary" id="pf-submit">Salvar alterações</button>
      </form>
    </div>

    <div class="card" style="max-width:480px;margin-top:18px;border:1px solid rgba(239,68,68,0.25);">
      <div style="font-size:13px;font-weight:700;color:var(--vermelho,#ef4444);margin-bottom:8px;">⚠️ Zona de perigo</div>
      <p style="font-size:12px;color:var(--texto-2);margin-bottom:12px;">Ao excluir sua conta, todos os seus dados, palpites e histórico serão permanentemente removidos. Esta ação não pode ser desfeita.</p>
      <button class="btn btn-danger btn-sm" id="btn-excluir-conta">Excluir minha conta</button>
    </div>
  `;
  document.getElementById('btn-excluir-conta').onclick = async () => {
    const confirmacao = prompt('Para confirmar, digite seu número de celular:');
    if(!confirmacao || confirmacao.replace(/\D/g,'') !== (user.telefone||'').replace(/\D/g,'')){
      toast('Celular incorreto. Conta não excluída.', 'error'); return;
    }
    const btn = document.getElementById('btn-excluir-conta');
    btn.disabled = true; btn.textContent = 'Excluindo...';
    const { error } = await sb.from('perfis').delete().eq('id', user.id);
    if(error){ toast('Erro ao excluir conta: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Excluir minha conta'; return; }
    await sb.auth.signOut();
    toast('Conta excluída com sucesso.');
    Auth.render();
  };

  document.getElementById('form-perfil').onsubmit = async (e) => {
    e.preventDefault();
    const novoNome = document.getElementById('pf-nome').value.trim();
    const novoTelefone = document.getElementById('pf-telefone').value.trim();
    const novaNascimento = document.getElementById('pf-nascimento').value;
    const novaSenha = document.getElementById('pf-senha').value;

    const btn = document.getElementById('pf-submit');
    btn.disabled = true; btn.textContent = 'Salvando...';

    // 1. Dados de negócio (tabela perfis)
    const { error: perfilError } = await sb.from('perfis').update({
      nome: novoNome,
      telefone: novoTelefone,
      data_nascimento: novaNascimento || null,
    }).eq('id', user.id);

    if(perfilError){ toast('Erro ao salvar perfil: ' + perfilError.message, 'error'); btn.disabled=false; btn.textContent='Salvar alterações'; return; }

    // 2. Senha (Supabase Auth)
    const authUpdate = {};
    if(novaSenha) authUpdate.password = novaSenha;

    if(Object.keys(authUpdate).length > 0){
      const { error: authError } = await sb.auth.updateUser(authUpdate);
      if(authError){
        toast('Dados salvos, mas houve um erro ao atualizar e-mail/senha: ' + authError.message, 'error');
        btn.disabled=false; btn.textContent='Salvar alterações';
        await Session._loadProfile(user.id);
        return;
      }
      if(authUpdate.email) toast('Verifique seu e-mail para confirmar a alteração.', 'error');
    }

    await Session._loadProfile(user.id);
    toast('Perfil atualizado!');
    App.render();
  };
};

const Modals = {
  render(root, modal){
    const handlers = {
      'bolao-form': this.bolaoForm,
      'jogo-form': this.jogoForm,
      'usuario-form': this.usuarioForm,
      'pagamento-form': this.pagamentoForm,
      'sorteio-form': this.sorteioForm,
      'reservar-cota': this.reservarCota,
      'cotas-view': this.cotasView,
      'confirmar-pagamento-participante': this.confirmarPagamentoParticipante,
    'ver-comprovante': this.verComprovante,
      'palpites-jogo': this.palpitesJogo,
    };
    const fn = handlers[modal.type];
    if(!fn){ root.innerHTML=''; return; }
    fn.call(this, root, modal.payload);
  },

  palpitesJogo(root, payload){
    const { jogo, palpites } = payload;
    const db = Store.data;
    const temResultado = jogo.placarMandante !== null && jogo.placarVisitante !== null;

    const linhas = palpites.length ? palpites.map(p=>{
      const u = db.usuarios.find(x=>x.id===p.usuarioId);
      const pts = p.pontos || 0;
      const cor = pts > 0 ? 'var(--verde)' : 'var(--texto-3)';
      return `<tr>
        <td style="font-weight:600;">${escapeHtml(u?u.nome:'—')}</td>
        <td class="font-mono" style="color:var(--verde);font-weight:700;">${p.placarMandante} × ${p.placarVisitante}</td>
        <td style="font-size:10.5px;color:var(--texto-3);">${escapeHtml(p.codigoVerificacao||'')}</td>
        <td>${temResultado ? `<span class="font-mono" style="color:${cor};font-weight:700;">${pts} pts</span>` : ''}</td>
      </tr>`;
    }).join('') : `<tr><td colspan="4"><div class="empty-state"><div class="msg">Nenhum palpite enviado ainda</div></div></td></tr>`;

    const resultado = temResultado
      ? `<div style="text-align:center;background:var(--bg-3);border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px;">
          Resultado oficial: <span class="font-mono" style="font-weight:700;color:var(--azul-2);">${jogo.placarMandante} × ${jogo.placarVisitante}</span>
        </div>`
      : `<div style="text-align:center;background:rgba(255,200,87,0.12);border-radius:8px;padding:8px;margin-bottom:14px;font-size:12px;color:var(--amarelo);">
          ⏳ Resultado ainda não lançado
        </div>`;

    const html = `
      ${resultado}
      <div style="font-size:12px;color:var(--texto-2);margin-bottom:10px;">${palpites.length} palpite(s) enviado(s)</div>
      <div class="card card-flush table-scroll">
        <table>
          <thead><tr><th>Participante</th><th>Palpite</th><th>Código</th><th>${temResultado?'Pontos':''}</th></tr></thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>`;

    this._shell(root, `${escapeHtml(jogo.mandante)} × ${escapeHtml(jogo.visitante)}`, html,
      `<button class="btn btn-outline" id="modal-cancel">Fechar</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();
  },

  _shell(root, title, bodyHtml, footHtml){
    root.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <div class="modal-head"><h3>${escapeHtml(title)}</h3><button class="modal-close" id="modal-close">×</button></div>
          <div class="modal-body">${bodyHtml}</div>
          ${footHtml ? `<div class="modal-foot">${footHtml}</div>` : ''}
        </div>
      </div>
    `;
    document.getElementById('modal-overlay').onclick = (e) => { if(e.target.id==='modal-overlay') App.closeModal(); };
    document.getElementById('modal-close').onclick = () => App.closeModal();
  },

  // ---------------- COMPROVANTE DE PALPITE ----------------
  // Chamado diretamente (não via App.openModal) logo após o palpite ser
  // salvo com sucesso no Supabase. Mostra o código de verificação e o
  // timestamp do servidor — o registro que resolve "eu disse que apostei X".
  comprovantePalpite(jogo, palpite, pagamento){
    const root = document.getElementById('modal-root');
    const dataFormatada = palpite.atualizadoEm
      ? new Date(palpite.atualizadoEm).toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'medium' })
      : new Date().toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'medium' });

    const cfg = Store.data.configuracao;
    const jaPago = pagamento && pagamento.status === 'pago';
    const temValor = pagamento && pagamento.valorInscricao > 0;

    this._shell(root, 'Palpite Confirmado', `
      <div style="text-align:center;padding:6px 0 4px;">
        <div style="font-size:13px;color:var(--texto-2);margin-bottom:14px;">
          ${escapeHtml(jogo.mandante)} <span class="font-mono">${palpite.placarMandante}</span> × <span class="font-mono">${palpite.placarVisitante}</span> ${escapeHtml(jogo.visitante)}
        </div>
        <div style="background:var(--bg-3);border:1.5px dashed var(--linha);border-radius:8px;padding:18px;margin-bottom:14px;">
          <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--texto-2);margin-bottom:6px;">Código de verificação</div>
          <div class="font-mono" style="font-size:24px;font-weight:700;color:var(--verde);letter-spacing:0.04em;">${escapeHtml(palpite.codigoVerificacao||'—')}</div>
        </div>
        <div style="font-size:12px;color:var(--texto-2);">Registrado em ${escapeHtml(dataFormatada)}</div>
      </div>

      ${temValor && !jaPago ? `
        <div class="divider"></div>
        <div style="background:var(--verde-bg);border-radius:8px;padding:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="font-size:12px;color:var(--texto-2);">Valor da aposta</span>
            <span class="font-mono" style="font-size:18px;font-weight:700;color:var(--verde);">${fmtMoney(pagamento.valorInscricao)}</span>
          </div>
          ${cfg.chavePix ? `
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:4px;">Chave PIX${cfg.nomeRecebedor ? ' — '+escapeHtml(cfg.nomeRecebedor) : ''}</div>
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;">
              <div class="font-mono" id="pix-key-text" style="flex:1;background:var(--bg);border:1px solid var(--linha);border-radius:6px;padding:8px 10px;font-size:13px;word-break:break-all;">${escapeHtml(cfg.chavePix)}</div>
              <button class="btn btn-secondary btn-sm" id="btn-copy-pix" type="button">Copiar</button>
            </div>
          ` : `<div class="text-muted" style="margin-bottom:10px;">O administrador ainda não cadastrou a chave PIX. Combine o pagamento diretamente com ele.</div>`}
          <div style="margin-top:4px;">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:6px;">Comprovante de pagamento</div>
            <label id="label-upload" style="display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px dashed var(--linha);border-radius:6px;padding:10px 12px;cursor:pointer;font-size:12px;color:var(--texto-2);">
              <span style="font-size:18px;">📎</span>
              <span id="upload-label-txt">Anexar foto do comprovante PIX</span>
              <input type="file" id="input-comprovante" accept="image/*" style="display:none;">
            </label>
            <div id="upload-preview" style="display:none;margin-top:8px;text-align:center;">
              <img id="preview-img" style="max-width:100%;max-height:180px;border-radius:6px;border:1px solid var(--linha);">
            </div>
          </div>
          <div style="font-size:11px;color:var(--texto-2);margin-top:10px;line-height:1.5;">
            Pague e anexe o comprovante antes do início do jogo.
          </div>
        </div>
      ` : ''}
      ${jaPago ? `<div style="text-align:center;color:var(--verde);font-weight:700;font-size:13px;margin-top:10px;">✓ Pagamento confirmado</div>` : ''}

      <div style="font-size:11.5px;color:var(--texto-3);margin-top:12px;line-height:1.5;text-align:center;">
        Guarde o código de verificação. Ele e o administrador consultam o mesmo registro —
        é a prova de qual placar você apostou e quando.
      </div>
    `, `<button class="btn btn-outline" id="modal-cancel">Fechar</button>${pagamento && pagamento.status !== 'pago' && pagamento.status !== 'em_analise' ? '<button class="btn btn-primary" id="btn-avisei">✓ Avisei que paguei</button>' : pagamento && pagamento.status === 'em_analise' ? '<span style="color:var(--amarelo);font-size:12px;font-weight:700;align-self:center;">⏳ Aguardando confirmação</span>' : ''}`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();

    const copyBtn = document.getElementById('btn-copy-pix');
    if(copyBtn){
      copyBtn.onclick = () => {
        const text = document.getElementById('pix-key-text').textContent;
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(()=> toast('Chave PIX copiada!')).catch(()=> toast('Não foi possível copiar. Copie manualmente.', 'error'));
        } else {
          toast('Copie a chave manualmente: ' + text, 'error');
        }
      };
    }

    // Preview da imagem antes do upload
    const inputComp = document.getElementById('input-comprovante');
    if(inputComp){
      inputComp.onchange = () => {
        const file = inputComp.files[0];
        if(!file) return;
        document.getElementById('upload-label-txt').textContent = file.name;
        const reader = new FileReader();
        reader.onload = e => {
          const prev = document.getElementById('upload-preview');
          document.getElementById('preview-img').src = e.target.result;
          prev.style.display = 'block';
        };
        reader.readAsDataURL(file);
      };
    }

    const aviseiBtn = document.getElementById('btn-avisei');
    if(aviseiBtn){
      aviseiBtn.onclick = async () => {
        aviseiBtn.disabled = true; aviseiBtn.textContent = 'Enviando...';

        const file = inputComp && inputComp.files[0];
        let comprovanteUrl = null;

        // Faz upload da imagem se foi selecionada
        if(file){
          const ext = file.name.split('.').pop();
          const path = `${Session.currentUser().id}/${pagamento.id}.${ext}`;
          const { error: upErr } = await sb.storage.from('comprovantes').upload(path, file, { upsert: true });
          if(upErr){
            toast('Erro ao enviar imagem: ' + upErr.message, 'error');
            aviseiBtn.disabled = false; aviseiBtn.textContent = '✓ Avisei que paguei';
            return;
          }
          comprovanteUrl = path;
        }

        const update = { forma_pagamento: 'PIX', status: 'em_analise' };
        if(comprovanteUrl) update.comprovante_url = comprovanteUrl;

        const { error } = await sb.from('pagamentos').update(update).eq('id', pagamento.id);
        if(error){
          toast('Erro ao enviar aviso: ' + error.message, 'error');
          aviseiBtn.disabled = false; aviseiBtn.textContent = '✓ Avisei que paguei';
          return;
        }
        Store.log(Session.currentUser().id, 'Participante avisou pagamento' + (comprovanteUrl ? ' com comprovante.' : '.'));
        toast(file ? 'Comprovante enviado! Aguarde a confirmação.' : 'Aviso enviado! Aguarde a confirmação.');
        await Store.reloadPagamentos();
        aviseiBtn.textContent = '⏳ Aguardando confirmação';
        aviseiBtn.disabled = true;
        aviseiBtn.className = 'btn btn-outline';
      };
    }
  },

  // ---------------- USUÁRIO ----------------
  usuarioForm(root, usuario){
    // Criação de conta nova é sempre feita pela própria pessoa via tela de cadastro
    // (com código de convite). Este modal serve apenas para o admin EDITAR
    // dados e status de um participante já existente.
    if(!usuario){
      this._shell(root, 'Novo Participante', `
        <p style="font-size:13px;color:var(--texto-2);line-height:1.6;">
          Participantes criam a própria conta pela tela de cadastro, usando o código de convite.
          Compartilhe o link do sistema e o código com seus colegas — assim que eles se cadastrarem,
          vão aparecer automaticamente nesta lista.
        </p>
      `, `<button class="btn btn-primary" id="modal-cancel">Entendi</button>`);
      document.getElementById('modal-cancel').onclick = () => App.closeModal();
      return;
    }

    this._shell(root, 'Editar Participante', `
      <form id="f-usuario">
        <div class="field"><label>Nome completo</label><input type="text" id="u-nome" value="${escapeHtml(usuario.nome)}" required></div>
        <div class="field"><label>E-mail</label><input type="email" value="${escapeHtml(usuario.email)}" disabled style="opacity:0.6;cursor:default;"></div>
        <div class="grid grid-2">
          <div class="field"><label>CPF (opcional)</label><input type="text" id="u-cpf" value="${escapeHtml(usuario.cpf||'')}"></div>
          <div class="field"><label>Telefone</label><input type="text" id="u-telefone" value="${escapeHtml(usuario.telefone||'')}"></div>
        </div>
        <div class="field"><label>Data de nascimento</label><input type="date" id="u-nasc" value="${usuario.nascimento||''}"></div>
        <div class="field"><label>Status</label>
          <select id="u-status"><option value="ativo" ${usuario.status==='ativo'?'selected':''}>Ativo</option><option value="inativo" ${usuario.status==='inativo'?'selected':''}>Inativo</option></select>
        </div>
        <hr style="border:none;border-top:1px solid var(--linha);margin:14px 0;">
        <div class="field">
          <label>Nova senha <span style="font-size:11px;color:var(--texto-3);font-weight:400;">(deixe em branco para não alterar)</span></label>
          <input type="password" id="u-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div style="margin-top:14px;padding:10px 12px;background:rgba(239,68,68,0.07);border-radius:8px;border:1px solid rgba(239,68,68,0.2);">
          <div style="font-size:12px;font-weight:700;color:var(--vermelho,#ef4444);margin-bottom:6px;">⚠️ Zona de perigo</div>
          <button type="button" class="btn btn-danger btn-sm" id="btn-excluir-user">Excluir participante</button>
        </div>
      </form>
    `, `<button class="btn btn-outline" id="modal-cancel">Cancelar</button><button class="btn btn-primary" id="modal-save">Salvar</button>`);

    document.getElementById('modal-cancel').onclick = () => App.closeModal();

    document.getElementById('btn-excluir-user').onclick = async () => {
      if(!confirm(`Tem certeza que deseja excluir "${usuario.nome}"? Esta ação não pode ser desfeita.`)) return;
      const btn = document.getElementById('btn-excluir-user');
      btn.disabled = true; btn.textContent = 'Excluindo...';
      const { error } = await sb.rpc('admin_excluir_usuario', { p_usuario_id: usuario.id });
      if(error){ toast('Erro ao excluir: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Excluir participante'; return; }
      toast('Participante excluído com sucesso.');
      await Store.reloadUsuarios();
      App.closeModal();
      Pages.adminParticipantes();
    };

    document.getElementById('modal-save').onclick = async () => {
      const nome = document.getElementById('u-nome').value.trim();
      const novaSenha = document.getElementById('u-senha').value.trim();
      if(!nome){ toast('Informe o nome.', 'error'); return; }
      if(novaSenha && novaSenha.length < 6){ toast('A senha deve ter pelo menos 6 caracteres.', 'error'); return; }
      const linha = {
        nome,
        cpf: document.getElementById('u-cpf').value.trim(),
        telefone: document.getElementById('u-telefone').value.trim(),
        data_nascimento: document.getElementById('u-nasc').value || null,
        status: document.getElementById('u-status').value,
      };
      const btn = document.getElementById('modal-save');
      btn.disabled = true; btn.textContent = 'Salvando...';

      const { error } = await sb.from('perfis').update(linha).eq('id', usuario.id);
      if(error){ toast('Erro ao salvar participante: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Salvar'; return; }

      if(novaSenha){
        const { error: senhaErr } = await sb.rpc('admin_set_user_password', { p_user_id: usuario.id, p_password: novaSenha });
        if(senhaErr){ toast('Dados salvos, mas erro ao alterar senha: ' + senhaErr.message, 'error'); }
        else { toast('Participante e senha atualizados!'); }
      } else {
        toast('Participante atualizado!');
      }

      Store.log(Session.currentUser().id, `Participante "${nome}" editado.`);
      await Store.reloadUsuarios();
      App.closeModal();
      Pages.adminParticipantes();
    };
  },

      if(error){ toast('Erro ao salvar pagamento: ' + error.message, 'error'); btn.disabled=false; btn.textContent=editing?'Salvar':'Registrar'; return; }

      Store.log(Session.currentUser().id, editing ? 'Pagamento editado.' : 'Pagamento registrado.');
      toast(editing ? 'Pagamento atualizado!' : 'Pagamento registrado!');
      await Store.reloadPagamentos();
      App.closeModal();
      Pages.adminPagamentos();
    };
  },

  // ---------------- CONFIRMAR PAGAMENTO (PARTICIPANTE) ----------------
  confirmarPagamentoParticipante(root, pagamento){
    const cfg = Store.data.configuracao;
    this._shell(root, 'Pagar via PIX', `
      <div style="background:var(--bg-3);border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:4px;">Valor da aposta</div>
        <div class="font-mono" style="font-size:22px;font-weight:700;color:var(--verde);">${fmtMoney(pagamento.valorInscricao)}</div>
      </div>
      ${cfg.chavePix ? `
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);margin-bottom:4px;">Chave PIX${cfg.nomeRecebedor ? ' — '+escapeHtml(cfg.nomeRecebedor) : ''}</div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;">
          <div class="font-mono" id="pix-key-text-2" style="flex:1;background:var(--bg);border:1px solid var(--linha);border-radius:6px;padding:8px 10px;font-size:13px;word-break:break-all;">${escapeHtml(cfg.chavePix)}</div>
          <button class="btn btn-secondary btn-sm" id="btn-copy-pix-2" type="button">Copiar</button>
        </div>
      ` : `<p class="text-muted" style="margin-bottom:14px;">O administrador ainda não cadastrou a chave PIX. Combine o pagamento diretamente com ele.</p>`}
      <p style="font-size:12.5px;color:var(--texto-2);">Depois de pagar, clica em "Avisar que paguei" para o administrador confirmar o recebimento.</p>
    `, `<button class="btn btn-outline" id="modal-cancel">Cancelar</button><button class="btn btn-primary" id="modal-save">Avisar que paguei</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();

    const copyBtn = document.getElementById('btn-copy-pix-2');
    if(copyBtn){
      copyBtn.onclick = () => {
        const text = document.getElementById('pix-key-text-2').textContent;
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(()=> toast('Chave PIX copiada!')).catch(()=> toast('Não foi possível copiar. Copie manualmente.', 'error'));
        } else {
          toast('Copie a chave manualmente: ' + text, 'error');
        }
      };
    }

    document.getElementById('modal-save').onclick = async () => {
      const btn = document.getElementById('modal-save');
      btn.disabled = true; btn.textContent = 'Enviando...';

      const { error } = await sb.from('pagamentos').update({
        forma_pagamento: 'PIX',
        status: 'em_analise',
      }).eq('id', pagamento.id);

      if(error){ toast('Erro ao avisar pagamento: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Avisar que paguei'; return; }

      Store.log(Session.currentUser().id, 'Participante avisou pagamento da inscrição (aguardando confirmação do admin).');
      toast('Aviso enviado! Aguarde a confirmação do administrador.');
      await Store.reloadPagamentos();
      App.closeModal();
      Pages.partPagamentos(Session.currentUser());
    };
  },

  // ---------------- SORTEIO ----------------
  sorteioForm(root){
    this._shell(root, 'Novo Sorteio / Rifa', `
      <form id="f-sorteio">
        <div class="field"><label>Nome do sorteio</label><input type="text" id="s-nome" required></div>
        <div class="field"><label>Descrição</label><textarea id="s-desc" rows="2"></textarea></div>
        <div class="grid grid-2">
          <div class="field"><label>Valor da cota (R$)</label><input type="number" min="0" step="0.01" id="s-valor" required></div>
          <div class="field"><label>Total de cotas</label><input type="number" min="1" id="s-total" value="50" required></div>
        </div>
        <div class="field"><label>Data do sorteio</label><input type="date" id="s-data"></div>
      </form>
    `, `<button class="btn btn-outline" id="modal-cancel">Cancelar</button><button class="btn btn-primary" id="modal-save">Criar sorteio</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();
    document.getElementById('modal-save').onclick = async () => {
      const nome = document.getElementById('s-nome').value.trim();
      if(!nome){ toast('Informe o nome do sorteio.', 'error'); return; }
      const linha = {
        nome,
        descricao: document.getElementById('s-desc').value.trim(),
        valor_cota: parseFloat(document.getElementById('s-valor').value||0),
        total_cotas: parseInt(document.getElementById('s-total').value||1,10),
        data_sorteio: document.getElementById('s-data').value || null,
        status: 'aberto',
      };
      const btn = document.getElementById('modal-save');
      btn.disabled = true; btn.textContent = 'Criando...';

      const { error } = await sb.from('sorteios').insert(linha);
      if(error){ toast('Erro ao criar sorteio: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Criar sorteio'; return; }

      Store.log(Session.currentUser().id, `Sorteio "${nome}" criado.`);
      toast('Sorteio criado!');
      await Store.reloadSorteios();
      App.closeModal();
      Pages.sorteios(Session.currentUser());
    };
  },

  // ---------------- VER COTAS ----------------
  cotasView(root, sorteio){
    const db = Store.data;
    const grid = [];
    for(let i=1;i<=sorteio.totalCotas;i++){
      const cota = sorteio.cotas.find(c=>c.numero===i);
      grid.push({ numero:i, cota });
    }
    this._shell(root, `Cotas — ${sorteio.nome}`, `
      <div class="flex-row" style="margin-bottom:12px;gap:14px;font-size:12px;">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--azul);border-radius:2px;margin-right:4px;"></span>Pago</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--amarelo);border-radius:2px;margin-right:4px;"></span>Reservado</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--bg-3);border:1px solid var(--linha);border-radius:2px;margin-right:4px;"></span>Livre</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px;">
        ${grid.map(g=>{
          let bg='var(--bg-3)', tip='Livre';
          if(g.cota){
            const u = db.usuarios.find(x=>x.id===g.cota.usuarioId);
            tip = (u?u.nome:'—') + ' — ' + g.cota.status;
            bg = g.cota.status==='pago' ? 'var(--azul)' : 'var(--amarelo)';
          }
          const color = g.cota ? '#fff' : 'var(--texto-2)';
          return `<div title="${escapeHtml(tip)}" class="font-mono" style="background:${bg};color:${color};border-radius:4px;text-align:center;padding:6px 0;font-size:11px;font-weight:700;${!g.cota?'border:1px solid var(--linha);':''}">${g.numero}</div>`;
        }).join('')}
      </div>
    `, `<button class="btn btn-outline" id="modal-cancel">Fechar</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();
  },

  // ---------------- RESERVAR COTA (PARTICIPANTE) ----------------
  reservarCota(root, sorteio){
    const livres = Logic.cotasDisponiveis(sorteio);
    this._shell(root, `Reservar cota — ${sorteio.nome}`, `
      ${livres.length ? `
      <div class="field"><label>Número da cota</label>
        <select id="r-numero">${livres.map(n=>`<option value="${n}">Cota nº ${n}</option>`).join('')}</select>
      </div>
      <div class="text-muted">Valor: <strong class="font-mono">${fmtMoney(sorteio.valorCota)}</strong>. A cota ficará reservada até a confirmação do pagamento pelo administrador.</div>
      ` : `<div class="empty-state"><div class="msg">Todas as cotas já foram reservadas ou vendidas</div></div>`}
    `, livres.length ? `<button class="btn btn-outline" id="modal-cancel">Cancelar</button><button class="btn btn-primary" id="modal-save">Reservar</button>` : `<button class="btn btn-outline" id="modal-cancel">Fechar</button>`);
    document.getElementById('modal-cancel').onclick = () => App.closeModal();
    const saveBtn = document.getElementById('modal-save');
    if(saveBtn) saveBtn.onclick = async () => {
      const numero = parseInt(document.getElementById('r-numero').value,10);
      const user = Session.currentUser();
      saveBtn.disabled = true; saveBtn.textContent = 'Reservando...';

      const { error } = await sb.from('cotas').insert({
        sorteio_id: sorteio.id,
        numero,
        usuario_id: user.id,
        status: 'reservado',
      });

      if(error){
        const msg = error.message && error.message.includes('duplicate')
          ? 'Essa cota já foi reservada por outra pessoa — escolha outra.'
          : 'Erro ao reservar cota: ' + error.message;
        toast(msg, 'error');
        saveBtn.disabled = false; saveBtn.textContent = 'Reservar';
        return;
      }

      Store.log(user.id, `Reservou a cota nº ${numero} do sorteio "${sorteio.nome}".`);
      toast(`Cota nº ${numero} reservada! Aguarde confirmação de pagamento.`);
      await Store.reloadSorteios();
      App.closeModal();
      Pages.sorteios(user);
    };
  },
};


</script>

</body>
</html>
