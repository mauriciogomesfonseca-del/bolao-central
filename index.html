<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>Bolão Central — Sistema de Bolões e Sorteios</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bolão Central">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Source+Sans+3:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
<style>
:root{
  --bg:#0D1117;
  --bg-2:#161B22;
  --bg-3:#1F2733;
  --card:#161B22;
  --card-hover:#1C2330;
  --linha:#252D3A;
  --texto:#E6EDF6;
  --texto-2:#8B98A9;
  --texto-3:#5C6B7E;
  --azul:#3D7DD8;
  --azul-2:#5B92E0;
  --azul-bg:rgba(61,125,216,0.14);
  --verde:#1ED760;
  --verde-2:#17B852;
  --verde-bg:rgba(30,215,96,0.13);
  --vermelho:#FF4757;
  --vermelho-bg:rgba(255,71,87,0.14);
  --amarelo:#FFC857;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Source Sans 3',sans-serif;
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
}
.font-display{font-family:'Archivo Black',sans-serif;letter-spacing:-0.01em;}
.font-mono{font-family:'Space Mono',monospace;}

/* ---------- LAYOUT ---------- */
#app{display:flex;flex-direction:column;min-height:100vh;}

.ticker-bar{
  background:var(--bg-2);
  border-bottom:2px solid var(--verde);
  display:flex;
  align-items:center;
  padding:0 20px;
  height:42px;
  flex-shrink:0;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
  position:relative;
}
.ticker-bar .tk-brand{
  font-family:'Archivo Black',sans-serif;
  font-size:13px;color:var(--texto);
  flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.ticker-bar .tk-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--verde);box-shadow:0 0 8px var(--verde);}
.ticker-bar .tk-brand span{color:var(--azul-2);}
.ticker-bar .tk-sep{width:1px;height:16px;background:var(--linha);flex-shrink:0;}
.ticker-bar .tk-item{
  display:flex;align-items:center;gap:7px;
  font-size:11.5px;
  color:var(--texto-2);
  flex-shrink:0;
}
.ticker-bar .tk-item .tk-val{
  font-family:'Space Mono',monospace;
  font-weight:700;font-size:12.5px;
  color:var(--texto);
}
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--vermelho-bg);
  color:var(--vermelho);
  font-size:9.5px;font-weight:700;letter-spacing:0.04em;
  padding:2px 7px;border-radius:3px;
  text-transform:uppercase;
}
.live-badge .pulse{
  width:6px;height:6px;border-radius:50%;background:var(--vermelho);
  animation:pulse 1.4s infinite;
}
@keyframes pulse{0%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}100%{opacity:1;transform:scale(1);}}

/* Bolinha de gol: aparece por alguns segundos sobre o placar quando ele muda,
   chamando atenção para o gol que acabou de ser marcado. */
.gol-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 5px;
  background:var(--verde);color:#0a1f12;
  border-radius:999px;font-size:11px;font-weight:800;
  animation:golPop 0.5s cubic-bezier(0.34,1.56,0.64,1), golFade 2.5s ease forwards;
  margin-left:6px;
}
@keyframes golPop{
  0%{transform:scale(0);}
  60%{transform:scale(1.25);}
  100%{transform:scale(1);}
}
@keyframes golFade{
  0%,70%{opacity:1;}
  100%{opacity:0;}
}
/* Placar que acabou de mudar pisca suavemente em verde para chamar atenção */
.placar-mudou{
  animation:placarFlash 1.2s ease;
}
@keyframes placarFlash{
  0%{ background:rgba(34,197,94,0.35); }
  100%{ background:transparent; }
}

.body-row{display:flex;flex:1;min-height:0;}
.sidebar{
  width:204px;
  background:var(--bg-2);
  border-right:1px solid var(--linha);
  border-top:3px solid var(--verde);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.brand{padding:16px 18px 12px;}
.brand .sub{
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--texto-3);
  font-weight:700;
}
.nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px;
  font-size:13.5px;font-weight:600;
  color:var(--texto-2);
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s, color .15s;
  -webkit-user-select:none;
  user-select:none;
}
.nav-item:hover{background:rgba(255,255,255,0.03);color:var(--texto);}
.nav-item.active{
  background:var(--azul-bg);
  color:var(--azul-2);
  border-left-color:var(--azul);
}
.nav-icon{width:18px;text-align:center;font-size:14px;}
.nav-section-label{
  font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--texto-3);
  padding:14px 18px 5px;
}
.sidebar-foot{
  padding:14px 18px;
  border-top:1px solid var(--linha);
  font-size:12px;
}
.user-pill{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.avatar-mini{
  width:27px;height:27px;border-radius:6px;
  background:linear-gradient(135deg, var(--azul), var(--azul-2));
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;flex-shrink:0;
}
.btn-logout{
  width:100%;
  background:transparent;
  border:1px solid var(--linha);
  color:var(--texto-2);
  padding:7px;border-radius:var(--radius);
  font-size:12px;cursor:pointer;font-weight:600;
}
.btn-logout:hover{background:rgba(255,255,255,0.04);color:var(--texto);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:var(--bg-2);
  border-bottom:1px solid var(--linha);
  padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.page-title{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--texto);}
.page-sub{font-size:12px;color:var(--texto-2);margin-top:2px;}
.content{flex:1;padding:24px 28px;overflow-y:auto;}

/* ---------- LOGIN SCREEN ---------- */
.login-wrap{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  overflow:hidden;
}
.login-wrap::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  background:
    radial-gradient(circle at 80% 10%, rgba(61,125,216,0.15), transparent 42%),
    radial-gradient(circle at 15% 95%, rgba(30,215,96,0.08), transparent 38%),
    linear-gradient(to bottom, rgba(13,17,23,0.55) 0%, rgba(13,17,23,0.25) 40%, rgba(13,17,23,0.55) 100%);
  pointer-events:none;
}
.login-wrap::after{
  content:"⚽";
  position:absolute;
  font-size:340px;
  opacity:0.025;
  bottom:-60px;
  right:-60px;
  pointer-events:none;
  line-height:1;
}
.mascote-wrap{display:block;}
@media (max-width:700px){
  .mascote-wrap{display:none !important;}
}
.login-card{
  position:relative;
  z-index:1;
  width:380px;
  background:rgba(22,27,34,0.55);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  box-shadow:0 24px 70px rgba(0,0,0,0.5);
  padding:34px 32px;
}
.login-badge{text-align:center;margin-bottom:22px;}
.login-badge .title{font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--texto);line-height:1.1;}
.login-badge .title span{color:var(--azul-2);}
.login-badge .sub{
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--verde);margin-top:6px;font-weight:700;
}
.field{margin-bottom:14px;}
.field label{
  display:block;font-size:11.5px;font-weight:700;
  color:var(--texto-2);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:0.04em;
}
.field input, .field select, .field textarea{
  width:100%;
  border:1.5px solid var(--linha);
  background:var(--bg-3);
  border-radius:var(--radius);
  padding:10px 12px;
  font-size:14px;
  font-family:'Source Sans 3',sans-serif;
  color:var(--texto);
}
.field input::placeholder{color:var(--texto-3);}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:2px solid var(--azul);
  outline-offset:1px;
  border-color:var(--azul);
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--radius);
  padding:10px 18px;
  font-size:13px;font-weight:700;
  cursor:pointer;
  transition:transform .08s, background .15s, box-shadow .15s;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--verde);color:#04140A;}
.btn-primary:hover{background:var(--verde-2);box-shadow:0 0 0 3px var(--verde-bg);}
.btn-block{width:100%;}
.btn-secondary{background:var(--azul);color:#fff;}
.btn-secondary:hover{background:var(--azul-2);}
.btn-outline{background:transparent;border:1.5px solid var(--linha);color:var(--texto);}
.btn-outline:hover{background:rgba(255,255,255,0.04);border-color:var(--texto-3);}
.btn-danger{background:var(--vermelho);color:#fff;}
.btn-danger:hover{background:#E63946;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn:focus-visible{outline:3px solid var(--amarelo);outline-offset:2px;}

.login-toggle{display:flex;background:var(--bg-3);border-radius:var(--radius);padding:3px;margin-bottom:18px;}
.login-toggle button{
  flex:1;background:transparent;border:none;padding:8px;
  font-size:12px;font-weight:700;letter-spacing:0.04em;
  border-radius:6px;cursor:pointer;color:var(--texto-2);
  text-transform:uppercase;
}
.login-toggle button.active{background:var(--azul);color:#fff;}
.login-error{
  background:var(--vermelho-bg);color:var(--vermelho);
  border:1px solid rgba(255,71,87,0.3);
  font-size:12px;padding:8px 10px;border-radius:var(--radius);
  margin-bottom:12px;
}
.login-hint{margin-top:16px;font-size:11px;color:var(--texto-3);text-align:center;line-height:1.6;}

/* ---- SPLASH + LOGIN COM MASCOTE ---- */

/* Splash: mascote em tela cheia, centralizado */
.splash{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
  overflow:hidden;
}
.splash-mascote{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  animation:mascoteEntrar 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes mascoteEntrar{
  from{opacity:0;transform:scale(1.04);}
  to{opacity:1;transform:scale(1);}
}
.splash-info{
  position:absolute;top:12%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:1;
  animation:fadeUp 0.5s ease 0.5s both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translate(-50%,-40%);}
  to{opacity:1;transform:translate(-50%,-50%);}
}
.splash .splash-title{
  font-family:'Archivo Black',sans-serif;
  font-size:30px;color:var(--texto);letter-spacing:-0.01em;
  text-shadow:0 2px 12px rgba(0,0,0,0.6);
}
.splash .splash-title span{color:var(--azul-2);}
.splash .splash-sub{
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--verde);margin-top:6px;font-weight:700;
  text-shadow:0 2px 8px rgba(0,0,0,0.6);
}

/* ── MASCOTE FUNDO ──────────────────────────────────────────────── */
.login-mascote-bg{
  position:absolute;
  inset:0;
  width:100%; height:100%;
  object-fit:contain;
  object-position:center bottom;
  pointer-events:none;
  z-index:1;
  animation:mascoteEntrar 0.9s cubic-bezier(0.22,1,0.36,1) both;
  transition:opacity 1.1s ease, filter 1.1s ease, transform 1.2s ease;
}
@keyframes mascoteEntrar{
  from{opacity:0;transform:scale(0.88) translateY(50px);}
  to  {opacity:1;transform:scale(1) translateY(0);}
}
.login-mascote-bg.marca-dagua{
  opacity:0.13;
  filter:saturate(0.3) blur(1px);
  transform:scale(1.05);
  animation:mascoteFlutua 3.8s ease-in-out infinite;
}
@keyframes mascoteFlutua{
  0%,100%{transform:scale(1.05) translateY(0);}
  50%    {transform:scale(1.05) translateY(-12px);}
}
/* ── CARD DE LOGIN ──────────────────────────────────────────────── */
.login-card{
  position:relative;
  z-index:3;
  width:min(400px,92vw);
  background:rgba(13,17,23,0.82);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:12px;
  box-shadow:0 24px 70px rgba(0,0,0,0.65);
  padding:34px 32px;
  opacity:0;
  transform:translateY(22px) scale(0.97);
  pointer-events:none;
  transition:opacity 0.7s ease, transform 0.7s cubic-bezier(0.22,1,0.36,1);
}
.login-card.visivel{
  opacity:1 !important;
  transform:translateY(0) scale(1) !important;
  pointer-events:auto !important;
}
.mascote-wrap{display:none !important;}

/* ---------- CARDS / GRID ---------- */
.grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media (max-width:720px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{
  background:var(--card);
  border:1px solid var(--linha);
  border-radius:var(--radius);
  padding:18px;
  transition:border-color .15s;
}
.card-flush{padding:0;overflow:hidden;}
.card-flush.table-scroll{overflow-x:auto;}
@media (max-width:860px){.card-flush.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}}

.stat-card{
  background:var(--card);
  border:1px solid var(--linha);
  border-radius:var(--radius);
  padding:16px 18px;
  position:relative;
  overflow:hidden;
}
.stat-card::before{
  content:"";position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--azul);
}
.stat-card.alert::before{background:var(--vermelho);}
.stat-card.good::before{background:var(--verde);}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-2);font-weight:700;margin-bottom:7px;}
.stat-value{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--texto);}
.stat-sub{font-size:11px;color:var(--texto-3);margin-top:4px;}

.section-title{
  font-family:'Archivo Black',sans-serif;
  font-size:14px;
  color:var(--texto);
  margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-title .right{font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:600;}

/* ---------- TABLE ---------- */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  text-align:left;
  font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;
  color:var(--texto-2);font-weight:700;
  padding:10px 12px;
  border-bottom:1px solid var(--linha);
  background:var(--bg-3);
}
td{padding:10px 12px;border-bottom:1px solid var(--linha);vertical-align:middle;color:var(--texto);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}

.badge-status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:4px;
  text-transform:uppercase;letter-spacing:0.03em;
}
.badge-pago{background:var(--verde-bg);color:var(--verde);}
.badge-pendente{background:rgba(255,200,87,0.14);color:var(--amarelo);}
.badge-atrasado{background:var(--vermelho-bg);color:var(--vermelho);}
.badge-isento{background:rgba(139,152,169,0.14);color:var(--texto-2);}
.badge-ativo{background:var(--verde-bg);color:var(--verde);}
.badge-inativo{background:rgba(139,152,169,0.14);color:var(--texto-2);}

/* ---------- LINHA DE ODDS (signature element) ---------- */
.sumula{
  background:var(--card);
  border:1px solid var(--linha);
  border-radius:var(--radius);
  overflow:hidden;
  transition:border-color .15s, background .15s;
}
.sumula:hover{border-color:#34405A;background:var(--card-hover);}
.sumula-head{
  background:var(--bg-3);
  color:var(--texto-2);
  padding:8px 14px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:10.5px;
  text-transform:uppercase;letter-spacing:0.05em;
}
.sumula-head .comp{color:var(--azul-2);font-weight:700;}
.sumula-body{
  padding:16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.sumula-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;min-width:0;}
.shield{
  width:36px;height:36px;
  background:var(--bg-3);
  color:var(--texto);
  display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black',sans-serif;font-size:11px;
  border-radius:50%;
  border:1.5px solid var(--linha);
}
.shield.flag-emoji{
  font-size:22px;
  background:transparent;
  border-color:transparent;
  letter-spacing:0;
}
@media (max-width:860px){
  .shield.flag-emoji{font-size:18px;}
}
@media (max-width:420px){
  .shield.flag-emoji{font-size:16px;}
}
.sumula-team .name{font-size:11.5px;font-weight:600;color:var(--texto);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.placar-box{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.placar-input{
  width:38px;height:38px;
  text-align:center;
  font-family:'Space Mono',monospace;
  font-size:17px;font-weight:700;
  border:1.5px solid var(--linha);
  border-radius:6px;
  background:var(--bg-3);
  color:var(--verde);
  transition:border-color .15s, background .15s;
}
.placar-input:focus{outline:none;border-color:var(--verde);background:var(--bg);}
.placar-input:disabled{background:var(--bg-3);color:var(--texto-3);}
.placar-sep{font-family:'Archivo Black',sans-serif;color:var(--texto-3);font-size:13px;}
.sumula-foot{
  padding:9px 14px;
  border-top:1px solid var(--linha);
  font-size:11px;color:var(--texto-2);
  display:flex;justify-content:space-between;align-items:center;
}
.pts-pill{
  font-family:'Space Mono',monospace;
  font-weight:700;color:var(--verde);
  background:var(--verde-bg);
  padding:2px 8px;border-radius:4px;
  font-size:11.5px;
}

/* ---------- MODAL ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.modal{
  background:var(--bg-2);
  border:1px solid var(--linha);
  border-radius:12px;
  max-width:520px;width:100%;
  max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,0.6);
}
.modal-head{
  padding:18px 22px;
  border-bottom:1px solid var(--linha);

.modal-close{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--texto-2);line-height:1;}

.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--linha);display:flex;justify-content:flex-end;gap:8px;}

.empty-state{text-align:center;padding:50px 20px;color:var(--texto-2);}
.empty-state .icon{font-size:34px;margin-bottom:10px;}
.empty-state .msg{font-size:14px;font-weight:700;color:var(--texto);margin-bottom:4px;}
.empty-state .hint{font-size:12px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.search-box{
  border:1.5px solid var(--linha);background:var(--bg-3);border-radius:var(--radius);

.search-box::placeholder{color:var(--texto-3);}

.tab{
  padding:9px 16px;font-size:13px;font-weight:700;color:var(--texto-2);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab.active{color:var(--texto);border-bottom-color:var(--verde);}
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--bg-2);color:var(--texto);
  border:1px solid var(--linha);
  padding:12px 18px;border-radius:var(--radius);
  font-size:13px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  z-index:200;
  display:flex;align-items:center;gap:8px;
  border-left:3px solid var(--verde);
  animation:slidein .25s ease;
}
.toast.error{border-left-color:var(--vermelho);}
@keyframes slidein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.flex-row{display:flex;gap:10px;align-items:center;}
.text-muted{color:var(--texto-2);font-size:12px;}
.divider{height:1px;background:var(--linha);margin:16px 0;}
.progress-bar{height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--verde);}
.pill-tag{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
  padding:2px 8px;border-radius:4px;background:var(--bg-3);color:var(--texto-2);
}
.rank-1 .pos-badge{background:var(--amarelo);color:#1B1404;}
.rank-2 .pos-badge{background:#9FB0C7;color:#0D1117;}
.rank-3 .pos-badge{background:#C97A40;color:#fff;}
.pos-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:6px;
  font-family:'Space Mono',monospace;font-weight:700;font-size:12px;
  background:var(--bg-3);color:var(--texto-2);
}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--linha);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:var(--azul-2);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}

.menu-toggle{
  display:none;

// Retorna emoji de bandeira ou o badge com a sigla (fallback)
function bandeira(sigla, nome){
  const s = (sigla||'').toUpperCase().trim();
  const emoji = BANDEIRAS[s];
  if(emoji) return `<span class="shield flag-emoji" title="${escapeHtml(nome||sigla)}">${emoji}</span>`;
  // fallback: shield com sigla (≤3 chars)
  const label = s || (nome||'').slice(0,3).toUpperCase();
  return `<span class="shield" title="${escapeHtml(nome||sigla)}">${escapeHtml(label)}</span>`;
}

const Map_ = {
  usuario(p){
    if(!p) return null;
    return {
      id: p.id, nome: p.nome, email: p.email || '', telefone: p.telefone||'',
      cpf: p.cpf||'', nascimento: p.data_nascimento||'', perfil: p.papel,
      status: p.status, dataCadastro: p.criado_em ? p.criado_em.slice(0,10) : '',
      foto:'',
    };
  },
  bolao(b){
    if(!b) return null;
    return {
      id:b.id, nome:b.nome, tipo:b.tipo, descricao:b.descricao||'',
      valorInscricao: Number(b.valor_inscricao)||0, dataInicio:b.data_inicio, dataFim:b.data_fim,
      premiacao:b.premiacao||'', status:b.status,
      regras:{ vencedor:b.regra_vencedor, empate:b.regra_empate, placarExato:b.regra_placar_exato, bonus:0 }
    };
  },
  jogo(j){
    if(!j) return null;
    return {
      id:j.id, bolaoId:j.bolao_id, mandante:j.mandante, visitante:j.visitante,
      mandanteSigla:j.mandante_sigla||'', visitanteSigla:j.visitante_sigla||'',
      rodada:j.rodada||'', dataHora: j.data_hora || '',
      placarMandante:j.placar_mandante, placarVisitante:j.placar_visitante, status:j.status,
      valorAposta: Number(j.valor_aposta)||0,
    };
  },
  palpite(p){
    if(!p) return null;
    return {
      id:p.id, jogoId:p.jogo_id, usuarioId:p.usuario_id,
      placarMandante:p.placar_mandante, placarVisitante:p.placar_visitante,
      pontos:p.pontos||0, codigoVerificacao:p.codigo_verificacao,
      criadoEm:p.criado_em, atualizadoEm:p.atualizado_em, travado:p.travado,
      numeroPalpite:p.numero_palpite||1,

  },
  pagamento(p){
    if(!p) return null;
    return {
      id:p.id, usuarioId:p.usuario_id, bolaoId:p.bolao_id, palpiteId:p.palpite_id||null,
      valorInscricao:Number(p.valor_inscricao)||0, valorPago:Number(p.valor_pago)||0,
      dataVencimento:p.data_vencimento, dataPagamento:p.data_pagamento,

      comprovanteUrl: p.comprovante_url||null,
    };
  },
  configuracao(c){
    if(!c) return { chavePix:'', nomeRecebedor:'' };
    return { chavePix:c.chave_pix||'', nomeRecebedor:c.nome_recebedor||'' };
  },
  sorteio(s, cotas){
    if(!s) return null;
    return {
      id:s.id, nome:s.nome, descricao:s.descricao||'', valorCota:Number(s.valor_cota)||0,
      totalCotas:s.total_cotas, dataSorteio:s.data_sorteio, status:s.status,
      vencedor: s.numero_vencedor ? { numero:s.numero_vencedor, usuarioId:s.vencedor_usuario_id, data:s.sorteado_em } : null,

// ---------------------------------------------------------------------
// STORE — cache local em memória, sincronizado com o Supabase.
// O resto do app lê Store.data.X de forma síncrona (igual antes);
// as funções abaixo são responsáveis por buscar do Supabase e
// preencher esse cache. Toda ESCRITA deve ir ao Supabase primeiro,
// e só depois recarregar o cache correspondente.
// ---------------------------------------------------------------------
const Store = {
  data: {
    usuarios: [], boloes: [], jogos: [], palpites: [], pagamentos: [],
    sorteios: [], notificacoes: [], auditLog: [], configuracao: { chavePix:'', nomeRecebedor:'' },
  },

  async loadAll(){
    // Limpa primeiro os palpites não pagos de jogos já iniciados, antes de
    // carregar os dados — assim ninguém vê uma aposta "fantasma" que já devia ter sido removida.
    await this.limparPalpitesVencidos();
    await Promise.all([
      this.reloadUsuarios(),
      this.reloadBoloes(),
      this.reloadJogos(),
      this.reloadPalpites(),
      this.reloadPagamentos(),
      this.reloadSorteios(),
      this.reloadConfiguracao(),
      this.reloadNotificacoes(),
    ]);
  },

  async limparPalpitesVencidos(){
    // Apenas admin tem acesso a esta RPC — participantes ignoram silenciosamente
    try {
      const { error } = await sb.rpc('limpar_palpites_nao_pagos_vencidos');
      if(error) console.warn('limparPalpitesVencidos:', error.message);
    } catch(e){ console.warn('limparPalpitesVencidos:', e); }
  },

  async reloadUsuarios(){
    const { data, error } = await sb.from('perfis').select('*').order('criado_em');
    if(error){ console.error('Erro ao carregar usuários:', error); return; }
    this.data.usuarios = (data||[]).map(Map_.usuario);
  },

  async reloadBoloes(){
    const { data, error } = await sb.from('boloes').select('*').order('criado_em');
    if(error){ console.error('[BOLAO] Erro ao carregar bolões:', error); return; }
    this.data.boloes = (data||[]).map(Map_.bolao);
  },

  async reloadJogos(){
    const { data, error } = await sb.from('jogos').select('*').order('data_hora');
    if(error){ console.error('Erro ao carregar jogos:', error); return; }
    this.data.jogos = (data||[]).map(Map_.jogo);
  },

  async reloadPalpites(){
    const { data, error } = await sb.from('palpites').select('*');
    if(error){ console.error('Erro ao carregar palpites:', error); return; }
    this.data.palpites = (data||[]).map(Map_.palpite);
  },

  async reloadNotificacoes(){
    const { data, error } = await sb.from('notificacoes').select('*').order('criado_em', { ascending: false });
    if(error){
      console.error('Erro ao carregar notificações:', error);
      this.ultimoErroNotificacoes = error.message;
      this.data.notificacoes = this.data.notificacoes || []; // nunca deixa undefined
      return;
    }
    this.ultimoErroNotificacoes = null;
    this.data.notificacoes = (data||[]).map(n=>({
      id: n.id,
      usuarioId: n.usuario_id,
      titulo: n.titulo,
      mensagem: n.mensagem,
      lida: n.lida,
      criadoEm: n.criado_em,
    }));
  },

  async reloadPagamentos(){
    const { data, error } = await sb.from('pagamentos').select('*');
    if(error){ console.error('Erro ao carregar pagamentos:', error); return; }
    this.data.pagamentos = (data||[]).map(Map_.pagamento);
  },

  async reloadSorteios(){
    const { data: sorteios, error } = await sb.from('sorteios').select('*').order('criado_em');
    if(error){ console.error('Erro ao carregar sorteios:', error); return; }
    const { data: cotas } = await sb.from('cotas').select('*');
    this.data.sorteios = (sorteios||[]).map(s => Map_.sorteio(s, (cotas||[]).filter(c=>c.sorteio_id===s.id)));
  },

  async reloadConfiguracao(){
    try {
      const { data, error } = await sb.from('configuracoes').select('*').eq('id', 1).maybeSingle();
      if(error){
        // Participantes sem acesso ficam com configuração padrão — não trava o boot
        console.warn('configuracoes indisponível:', error.message);
        return;
      }
      this.data.configuracao = Map_.configuracao(data);
    } catch(e){
      console.warn('Erro ao carregar configurações:', e);
    }
  },

  // Mantido por compatibilidade com chamadas antigas no resto do app;
  // agora é "fire and forget" para auditoria (não bloqueia a UI).
  log(usuarioId, acao){
    sb.from('auditoria').insert({ usuario_id: usuarioId, acao }).then(({error})=>{
      if(error) console.error('Erro ao gravar auditoria:', error);
    });
  },

  async reloadAuditoria(){
    const { data, error } = await sb.from('auditoria').select('*').order('criado_em', { ascending:false }).limit(200);
    if(error){ console.error('Erro ao carregar auditoria:', error); return; }
    this.data.auditLog = (data||[]).map(l => ({ id:l.id, usuarioId:l.usuario_id, acao:l.acao, data:l.criado_em }));
  },
};

// SESSION — agora espelha a sessão real do Supabase Auth

const Session = {
  _user: null, // perfil (Map_.usuario) da pessoa logada, cacheado em memória

  async init(){
    const { data } = await sb.auth.getSession();
    if(data && data.session){
      await this._loadProfile(data.session.user.id);
    }
    return this._user;
  },

  async _loadProfile(authUserId){
    const { data, error } = await sb.from('perfis').select('*').eq('id', authUserId).maybeSingle();
    if(error || !data){
      this._user = null;
      return null;
    }
    // garante e-mail no perfil em memória (vem do auth, não da tabela perfis)
    const { data: authData } = await sb.auth.getUser();
    const perfil = Map_.usuario(data);
    perfil.email = authData && authData.user ? authData.user.email : '';
    this._user = perfil;
    return this._user;
  },

  currentUser(){ return this._user; },

  async clear(){
    await sb.auth.signOut();
    this._user = null;
  },
};

function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error' ? ' error' : '');
  el.innerHTML = (type==='error' ? '⚠ ' : '✓ ') + escapeHtml(msg);
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3200);
}

  return `${nums}@bolaocentral.app`;
}

      const codigoNorm = convite.trim().toUpperCase();
      const { data: conviteData, error: conviteErr } = await sb
        .from('convites')
        .select('id, usos_atuais, usos_maximos')
        .eq('codigo', codigoNorm)
        .maybeSingle();

      if(conviteErr) return erroUI('Erro ao verificar o convite. Tente novamente.');
      if(!conviteData) return erroUI('Código de convite inválido. Verifique e tente novamente.');
      if(conviteData.usos_atuais >= conviteData.usos_maximos) return erroUI('Este código de convite já atingiu o limite de usos.');

      // 2. Gera email fictício a partir do celular
      const email = celularParaEmail(celular);
      btn.textContent = 'Criando conta...';
      const { data, error } = await sb.auth.signUp({ email, password: senha });

      if(error){
        const jaExiste =
          error.message.includes('already registered') ||
          error.message.includes('já cadastrado') ||
          error.message.includes('already exists') ||
          error.status === 422;
        return erroUI(jaExiste
          ? 'Já existe uma conta com esse número de celular.'
          : 'Não foi possível criar a conta: ' + error.message);
      }

      if(data.user && data.user.identities && data.user.identities.length === 0){
        return erroUI('Já existe uma conta com esse número de celular.');
      }

      // 3. Garante sessão ativa
      if(!data.session){
        const { error: loginErr } = await sb.auth.signInWithPassword({ email, password: senha });
        if(loginErr) return erroUI('Conta criada, mas não foi possível entrar. Tente fazer login.');
      }

      // 4. Cria o perfil via RPC
      btn.textContent = 'Finalizando cadastro...';
      const { error: rpcError } = await sb.rpc('cadastrar_com_convite', {
        p_nome: nome,
        p_telefone: celular,
        p_codigo_convite: codigoNorm,
      });

      if(rpcError){
        await sb.auth.signOut();
        return erroUI(rpcError.message.includes('Código de convite')
          ? rpcError.message
          : 'Não foi possível concluir o cadastro: ' + rpcError.message);
      }

      const { data: userData } = await sb.auth.getUser();
      await Session._loadProfile(userData.user.id);
      toast('Conta criada com sucesso! Bem-vindo(a).');
      await App.boot();
    };
  }
};

const Logic = {
  // Calcula pontos de um palpite dado o resultado oficial e as regras do bolão
  calcularPontos(palpite, jogo, bolao){
    if(jogo.placarMandante===null || jogo.placarVisitante===null) return 0;
    const regras = bolao.regras || { vencedor:3, empate:3, placarExato:10, bonus:0 };
    const pm = palpite.placarMandante, pv = palpite.placarVisitante;
    const rm = jogo.placarMandante, rv = jogo.placarVisitante;

    if(pm === rm && pv === rv) return regras.placarExato;

    const palpiteResultado = pm > pv ? 'mandante' : (pm < pv ? 'visitante' : 'empate');
    const realResultado = rm > rv ? 'mandante' : (rm < rv ? 'visitante' : 'empate');

    if(palpiteResultado === realResultado){
      return palpiteResultado === 'empate' ? regras.empate : regras.vencedor;
    }
    return 0;
  },

  // Recalcula pontos de todos os palpites vinculados a um jogo (chamado ao lançar resultado).
  // O cálculo de fato acontece no banco (função recalcular_pontos_jogo), garantindo que
  // o resultado seja sempre consistente com a regra oficial gravada no bolão.
  async recalcularPontosDoJogo(jogoId){
    const { error } = await sb.rpc('recalcular_pontos_jogo', { p_jogo_id: jogoId });
    if(error){ console.error('Erro ao recalcular pontos:', error); return; }
    await Store.reloadPalpites();
  },

  rankingDoBolao(bolaoId, periodo){
    const db = Store.data;
    const jogosDoBolao = db.jogos.filter(j => j.bolaoId === bolaoId).map(j=>j.id);
    const participantes = db.usuarios.filter(u => u.perfil === 'participante');

    let palpitesConsiderados = db.palpites.filter(p => jogosDoBolao.includes(p.jogoId));

    if(periodo === 'mensal'){
      const mesAtual = new Date().toISOString().slice(0,7);
      const jogosDoMes = db.jogos.filter(j => j.bolaoId===bolaoId && j.dataHora && j.dataHora.slice(0,7)===mesAtual).map(j=>j.id);
      palpitesConsiderados = palpitesConsiderados.filter(p => jogosDoMes.includes(p.jogoId));
    }

    const linhas = participantes.map(u => {
      const meus = palpitesConsiderados.filter(p => p.usuarioId === u.id);
      const jogosFinalizados = meus.filter(p => {
        const j = db.jogos.find(jj=>jj.id===p.jogoId);
        return j && j.status==='finalizado';
      });
      const acertos = jogosFinalizados.filter(p => p.pontos > 0).length;
      const erros = jogosFinalizados.filter(p => p.pontos === 0).length;
      const pontuacao = meus.reduce((s,p)=>s+(p.pontos||0),0);
      const aproveitamento = jogosFinalizados.length ? Math.round((acertos/jogosFinalizados.length)*100) : 0;
      return { usuario:u, pontuacao, acertos, erros, aproveitamento, jogosPalpitados: meus.length };
    });

    linhas.sort((a,b)=> b.pontuacao - a.pontuacao || b.aproveitamento - a.aproveitamento);
    linhas.forEach((l,i)=> l.posicao = i+1);
    return linhas;
  },

  // ---------- PAGAMENTOS / FINANCEIRO ----------
  resumoFinanceiro(bolaoId){
    const db = Store.data;
    const pagtos = bolaoId ? db.pagamentos.filter(p=>p.bolaoId===bolaoId) : db.pagamentos;
    const totalArrecadado = pagtos.reduce((s,p)=> s + (p.valorPago||0), 0);
    const totalPendente = pagtos.filter(p=>p.status==='pendente'||p.status==='atrasado')
      .reduce((s,p)=> s + (p.valorInscricao - (p.valorPago||0)), 0);
    const pagantes = pagtos.filter(p=>p.status==='pago').length;
    const inadimplentes = pagtos.filter(p=>p.status==='atrasado').length;
    return { totalArrecadado, totalPendente, pagantes, inadimplentes, total: pagtos.length };
  },

  // Atualiza pagamentos vencidos em segundo plano (não bloqueia a UI).
  // Chamada via "fire and forget" a partir do boot/navegação; o resultado
  // só aparece após o próximo reload do cache de pagamentos.
  async atualizarStatusPagamentosEmSegundoPlano(){
    const db = Store.data;
    const hoje = todayISO();
    const atrasar = db.pagamentos.filter(p => p.status === 'pendente' && p.dataVencimento && p.dataVencimento < hoje);
    if(atrasar.length === 0) return;
    await Promise.all(atrasar.map(p =>
      sb.from('pagamentos').update({ status:'atrasado' }).eq('id', p.id)
    ));
    atrasar.forEach(p => { p.status = 'atrasado'; }); // reflete no cache local já carregado
  },

  // ---------- DASHBOARD ----------
  // Síncrona: lê só o cache já carregado em Store.data (não bate no Supabase).
  // A checagem de pagamentos atrasados roda separadamente, em segundo plano.
  dashboardStats(){
    const db = Store.data;
    const fin = this.resumoFinanceiro();
    return {
      participantesCadastrados: db.usuarios.filter(u=>u.perfil==='participante').length,
      participantesAtivos: db.usuarios.filter(u=>u.perfil==='participante' && u.status==='ativo').length,
      pagamentosRecebidos: fin.totalArrecadado,
      pagamentosPendentes: fin.totalPendente,
      jogosCadastrados: db.jogos.length,
      jogosFinalizados: db.jogos.filter(j=>j.status==='finalizado').length,
      boloesAtivos: db.boloes.filter(b=>b.status==='ativo').length,
      sorteiosAbertos: db.sorteios.filter(s=>s.status==='aberto').length,
    };
  },

  // ---------- SORTEIOS ----------
  cotasDisponiveis(sorteio){
    const ocupadas = new Set(sorteio.cotas.map(c=>c.numero));
    const livres = [];
    for(let i=1;i<=sorteio.totalCotas;i++){ if(!ocupadas.has(i)) livres.push(i); }
    return livres;
  },

  async realizarSorteio(sorteioId){
    const db = Store.data;
    const sorteio = db.sorteios.find(s=>s.id===sorteioId);
    if(!sorteio) return null;
    const pagas = sorteio.cotas.filter(c=>c.status==='pago');
    if(pagas.length===0) return null;
    const vencedora = pagas[Math.floor(Math.random()*pagas.length)];
    const agora = new Date().toISOString();

    const { error } = await sb.from('sorteios').update({
      numero_vencedor: vencedora.numero,
      vencedor_usuario_id: vencedora.usuarioId,
      sorteado_em: agora,
      status: 'finalizado',
    }).eq('id', sorteioId);

    if(error){ console.error('Erro ao realizar sorteio:', error); return null; }

    await Store.reloadSorteios();
    return { numero: vencedora.numero, usuarioId: vencedora.usuarioId, data: agora };
  },
};

// ---- NOTIFICAÇÕES: PERMISSÃO + POP-UP DO SISTEMA + POLLING ---------------
// Pede permissão de notificação de forma discreta (só quando o usuário já
// está logado, nunca na tela de login) e dispara um pop-up nativo do
// navegador (Notification API) sempre que uma notificação nova chega.

let notificacoesPollingId = null;
const NOTIF_IDS_VISTOS_KEY = 'bolao_notif_ids_vistos';

function notifIdsVistosCarregar(){
  try{
    return new Set(JSON.parse(localStorage.getItem(NOTIF_IDS_VISTOS_KEY) || '[]'));
  }catch(e){ return new Set(); }
}
function notifIdsVistosSalvar(set){
  try{
    // mantém só os 200 mais recentes para não crescer pra sempre
    const arr = Array.from(set).slice(-200);
    localStorage.setItem(NOTIF_IDS_VISTOS_KEY, JSON.stringify(arr));
  }catch(e){ /* localStorage indisponível, ignora silenciosamente */ }
}

// Pede permissão de notificação. Só chama o prompt nativo se ainda
// estiver no estado 'default' (nunca perguntado) — nunca insiste se a
// pessoa já negou.
async function notifPedirPermissaoSeNecessario(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    try{ await Notification.requestPermission(); }catch(e){ /* ignora */ }
  }
}

// Dispara o pop-up nativo do navegador/SO para uma notificação,
// além do toast interno do app.
function notifDispararPopup(titulo, mensagem){
  toast(`🔔 ${titulo}`);
  if('Notification' in window && Notification.permission === 'granted'){
    try{
      const n = new Notification(titulo, {
        body: mensagem,
        icon: './icon-192.png',
        badge: './icon-192.png',
        tag: 'bolao-central-notif',
      });
      n.onclick = () => { window.focus(); n.close(); };
    }catch(e){ console.error('Erro ao exibir notificação:', e); }
  }
}

// Verifica periodicamente se há notificações novas (não vistas neste
// dispositivo) destinadas ao usuário logado, e dispara pop-up para cada uma.
// "primeiroPolling" controla se estamos na primeira verificação desde que o
// app foi aberto nesta sessão — usado para não bombardear com pop-ups de
// notificações antigas que já existiam antes de abrir o app agora.
let notifPrimeiroPollingFeito = false;
async function notificacoesVerificarNovas(){
  const user = Session.currentUser ? Session.currentUser() : null;
  if(!user) return;

  await Store.reloadNotificacoes();
  const minhas = Store.data.notificacoes.filter(n=>n.usuarioId===user.id);

  const vistos = notifIdsVistosCarregar();
  const novas = minhas.filter(n=>!vistos.has(n.id));

  // Só a primeiríssima execução do polling nesta sessão é "silenciosa"
  // (evita bombardear notificações antigas ao abrir o app). A partir da
  // segunda execução em diante, qualquer notificação nova dispara pop-up
  // — mesmo que seja a primeira notificação que esse usuário já recebeu.
  const ehPrimeiroPolling = !notifPrimeiroPollingFeito;
  notifPrimeiroPollingFeito = true;

  novas.forEach(n=>{
    if(!ehPrimeiroPolling) notifDispararPopup(n.titulo, n.mensagem);
    vistos.add(n.id);
  });
  notifIdsVistosSalvar(vistos);
}

function notificacoesPollingIniciar(){
  if(notificacoesPollingId) return; // já está rodando
  notificacoesVerificarNovas(); // primeira checagem (silenciosa, só marca como visto)
  notificacoesPollingId = setInterval(notificacoesVerificarNovas, 20000); // a cada 20s
}
function notificacoesPollingParar(){
  if(notificacoesPollingId){ clearInterval(notificacoesPollingId); notificacoesPollingId = null; }
}

// ---- PLACAR EM TEMPO REAL (Supabase Realtime) -----------------------------
// Escuta mudanças na tabela "jogos" em tempo real: quando o admin atualiza o
// placar (parcial, "em_andamento", ou final), todo participante com o app
// aberto recebe a atualização na hora, sem precisar recarregar a página.
// Também detecta gols (placar aumentou) e dispara notificação + badge visual.

let canalJogosRealtime = null;

// Ignora o "primeiro lote" de eventos que podem chegar só de reconectar o
// canal (evita disparar notificação de gol "antiga" ao reabrir o app).
let realtimeJogosPrimeiraSincronizacaoFeita = false;

function realtimeJogosIniciar(){
  if(canalJogosRealtime) return; // já está escutando

  canalJogosRealtime = sb
    .channel('jogos-placar-realtime')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'jogos' }, (payload) => {
      tratarAtualizacaoDeJogoEmTempoReal(payload.new, payload.old);
    })
    .subscribe();

  // Após o primeiro pequeno intervalo, passamos a tratar futuras mudanças
  // como "ao vivo" (disparando notificação de gol de verdade).
  setTimeout(() => { realtimeJogosPrimeiraSincronizacaoFeita = true; }, 3000);
}

function realtimeJogosParar(){
  if(canalJogosRealtime){ sb.removeChannel(canalJogosRealtime); canalJogosRealtime = null; }
  realtimeJogosPrimeiraSincronizacaoFeita = false;
}

function tratarAtualizacaoDeJogoEmTempoReal(jogoNovoRaw, jogoAntigoRaw){
  const db = Store.data;
  const idx = db.jogos.findIndex(j=>j.id===jogoNovoRaw.id);
  if(idx === -1) return; // jogo não está carregado nesta sessão (ex: outro bolão)

  const jogoAntes = db.jogos[idx];
  const placarMandanteAntes = jogoAntes.placarMandante;
  const placarVisitanteAntes = jogoAntes.placarVisitante;

  // Atualiza o jogo em memória com os dados novos do banco.
  const jogoAtualizado = {
    ...jogoAntes,
    placarMandante: jogoNovoRaw.placar_mandante,
    placarVisitante: jogoNovoRaw.placar_visitante,
    status: jogoNovoRaw.status,
  };
  db.jogos[idx] = jogoAtualizado;

  const houveGol = realtimeJogosPrimeiraSincronizacaoFeita &&
    ((jogoAtualizado.placarMandante ?? 0) > (placarMandanteAntes ?? -1) ||
     (jogoAtualizado.placarVisitante ?? 0) > (placarVisitanteAntes ?? -1));

  if(houveGol){
    const placarTexto = `${jogoAtualizado.mandante} ${jogoAtualizado.placarMandante} x ${jogoAtualizado.placarVisitante} ${jogoAtualizado.visitante}`;
    notifDispararPopup('⚽ GOL!', placarTexto);
    marcarGolNaTela(jogoAtualizado.id);
  }

  // Se a tela atual estiver mostrando esse jogo, re-renderiza pra refletir
  // o novo placar imediatamente (sem esperar navegação/polling).
  rerenderizarTelaAtualSeRelevante();
}

// Mostra o badge "⚽" pulsante sobre o placar do jogo na tela, se ela estiver visível.
function marcarGolNaTela(jogoId){
  document.querySelectorAll(`[data-placar-jogo="${jogoId}"]`).forEach(el=>{
    el.classList.add('placar-mudou');
    const existente = el.querySelector('.gol-badge');
    if(existente) existente.remove();
    const badge = document.createElement('span');
    badge.className = 'gol-badge';
    badge.textContent = '⚽';
    el.appendChild(badge);
    setTimeout(()=>{ badge.remove(); el.classList.remove('placar-mudou'); }, 2600);
  });
}

// Re-renderiza a tela atual se ela depende dos dados de jogos (placar),
// para refletir a atualização em tempo real sem precisar navegar.
function rerenderizarTelaAtualSeRelevante(){
  const telasComPlacar = ['dashboard','palpites','jogos','copa'];
  if(telasComPlacar.includes(App.route)) App.renderPage();
}

// ---- PWA: SERVICE WORKER + INSTALAÇÃO -------------------------------------
// Registra o Service Worker o quanto antes (necessário para o navegador
// considerar o site "instalável" como app).
let swRegistration = null;
let swEsperandoAtivacao = null; // guarda o worker novo que está pronto, esperando o usuário confirmar

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then((reg)=>{
      swRegistration = reg;

      // Caso já exista um worker esperando no momento do registro
      // (ex: a pessoa abriu o app depois de uma atualização ter sido publicada).
      if(reg.waiting) mostrarBannerAtualizacao(reg.waiting);

      // Detecta quando uma nova versão do sw.js é encontrada e instalada.
      reg.addEventListener('updatefound', () => {
        const novoWorker = reg.installing;
        if(!novoWorker) return;
        novoWorker.addEventListener('statechange', () => {
          // 'installed' + já existe um controller ativo = é uma ATUALIZAÇÃO
          // (não a primeira instalação), então vale avisar o usuário.
          if(novoWorker.state === 'installed' && navigator.serviceWorker.controller){
            mostrarBannerAtualizacao(novoWorker);
          }
        });
      });

      // Verifica periodicamente se há uma versão nova publicada no servidor
      // (útil para quem deixa o app/PWA aberto por muito tempo sem recarregar).
      setInterval(() => { reg.update().catch(()=>{}); }, 15*60*1000);
    }).catch(err=>{
      console.error('Falha ao registrar Service Worker:', err);
    });

    // Quando o novo Service Worker assume o controle (depois do SKIP_WAITING),
    // recarrega a página automaticamente para usar a versão nova.
    let jaRecarregou = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(jaRecarregou) return;
      jaRecarregou = true;
      window.location.reload();
    });
  });
}

// Mostra o banner "Nova versão disponível" no topo do app.
function mostrarBannerAtualizacao(worker){
  swEsperandoAtivacao = worker;
  if(document.getElementById('banner-atualizar-app')) return; // já está mostrando

  const banner = document.createElement('div');
  banner.id = 'banner-atualizar-app';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:10000;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;font-size:13px;box-shadow:0 2px 12px rgba(0,0,0,0.3);';
  banner.innerHTML = `
    <span>🔄 Nova versão do app disponível.</span>
    <button id="btn-atualizar-app" style="background:#fff;color:#1d4ed8;border:none;border-radius:6px;padding:6px 14px;font-weight:700;font-size:12px;cursor:pointer;">Atualizar agora</button>
  `;
  document.body.prepend(banner);
  document.getElementById('btn-atualizar-app').onclick = () => {
    if(swEsperandoAtivacao){
      swEsperandoAtivacao.postMessage('SKIP_WAITING');
    }
    banner.innerHTML = '<span>Atualizando...</span>';
  };
}

// Captura o prompt nativo de instalação do Chrome/Android e guarda para
// disparar quando o usuário clicar no botão "Instalar app" da nossa UI
// (o navegador não mostra esse prompt automaticamente sem interação).
let deferredInstallPrompt = null;
let pwaJaInstalado = false;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  App.atualizarBotaoInstalar && App.atualizarBotaoInstalar();
});

window.addEventListener('appinstalled', () => {
  pwaJaInstalado = true;
  deferredInstallPrompt = null;
  toast('App instalado com sucesso! 🎉');
  App.atualizarBotaoInstalar && App.atualizarBotaoInstalar();
});

// Detecta se já está rodando como app instalado (modo standalone)
function pwaRodandoStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true; // iOS Safari
}

async function pwaInstalar(){
  if(!deferredInstallPrompt){
    toast('Para instalar: abra o menu (⋮) do navegador e toque em "Instalar app" ou "Adicionar à tela inicial".');
    return;
  }
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if(outcome === 'accepted'){
    toast('Instalando o app...');
  }
  deferredInstallPrompt = null;
  App.atualizarBotaoInstalar && App.atualizarBotaoInstalar();
}

// Mantém a sessão sincronizada caso o token expire/renove em segundo plano,
// ou caso a pessoa faça logout em outra aba.
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_OUT'){
    Session._user = null;
    notificacoesPollingParar();
    realtimeJogosParar();
    Auth.render();
  }
  if(event === 'TOKEN_REFRESHED'){
    // Sessão renovada com sucesso — nada a fazer, só log silencioso.
    console.log('[AUTH] Token renovado com sucesso.');
  }
});

// Detecta sessão "zumbi": quando o refresh token falha (ex: expirou ou foi
// revogado), o Supabase às vezes não dispara SIGNED_OUT automaticamente,
// e o app continua rodando com uma sessão inválida — fazendo o RLS do
// banco silenciosamente devolver menos dados do que deveria (ex: listas
// de bolões/pagamentos vindo incompletas para o admin).
// Verificamos isso periodicamente e, se a sessão estiver morta, forçamos
// um logout limpo com aviso, para a pessoa logar de novo e resolver.
async function verificarSaudeDaSessao(){
  if(!Session.currentUser()) return; // não está logado, nada a verificar
  const { data, error } = await sb.auth.getSession();
  const sessaoValida = !error && data && data.session;
  if(!sessaoValida){
    console.warn('[AUTH] Sessão expirada/inválida detectada — forçando logout.');
    notificacoesPollingParar();
    realtimeJogosParar();
    Session._user = null;
    toast('Sua sessão expirou. Faça login novamente.', 'error');
    Auth.render();
  }
}
// Checa a saúde da sessão a cada 5 minutos, e também sempre que o app
// volta a ficar visível (ex: usuário voltou pro app depois de minimizar).
setInterval(verificarSaudeDaSessao, 5*60*1000);
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') verificarSaudeDaSessao();
});

      return;
    }

    // Agrupa notificações do mesmo "envio" (mesmo título, mensagem e instante
    // de criação — já que um envio para "todos" insere 1 linha por
    // participante, todas com o mesmo timestamp exato). Isso evita mostrar
    // N cópias idênticas no histórico e permite excluir todas de uma vez.
    const gruposPorChave = new Map();
    notifs.forEach(n=>{
      const chave = `${n.titulo}|${n.mensagem}|${n.criadoEm}`;
      if(!gruposPorChave.has(chave)){
        gruposPorChave.set(chave, { titulo:n.titulo, mensagem:n.mensagem, criadoEm:n.criadoEm, itens:[] });
      }
      gruposPorChave.get(chave).itens.push(n);
    });
    const gruposNotif = Array.from(gruposPorChave.values())
      .sort((a,b)=> new Date(b.criadoEm) - new Date(a.criadoEm));
    document.getElementById('content').innerHTML = `
      <div class="grid grid-2" style="align-items:start;">

        <!-- Formulário de envio -->
        <div class="card">
          <div class="section-title" style="margin-bottom:14px;">📣 Nova notificação</div>
          <div class="field">
            <label>Destinatário</label>
            <select id="notif-dest">
              <option value="todos">Todos os participantes</option>
              ${participantes.map(u=>`<option value="${u.id}">${escapeHtml(u.nome)}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Título</label>
            <input type="text" id="notif-titulo" placeholder="Ex: Jogo amanhã!" maxlength="80">
          </div>
          <div class="field">
            <label>Mensagem</label>
            <textarea id="notif-msg" rows="3" placeholder="Digite a mensagem..." style="width:100%;resize:vertical;"></textarea>
          </div>
          <button class="btn btn-primary" id="btn-enviar-notif">📤 Enviar notificação</button>
        </div>

        <!-- Histórico -->
        <div class="card">
          <div class="section-title" style="margin-bottom:14px;">Histórico <span style="font-size:12px;color:var(--texto-3);">(${gruposNotif.length} ${gruposNotif.length===1?'envio':'envios'})</span></div>
          ${gruposNotif.length ? gruposNotif.slice(0,20).map(grupo=>{
            const data = grupo.criadoEm ? new Date(grupo.criadoEm).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
            const qtdLidas = grupo.itens.filter(n=>n.lida).length;
            const destinoLabel = grupo.itens.length === 1
              ? (db.usuarios.find(x=>x.id===grupo.itens[0].usuarioId)?.nome || 'Participante')
              : `${grupo.itens.length} participantes`;
            return `<div style="padding:10px 0;border-bottom:1px solid var(--linha);">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;">
                <span style="font-weight:700;font-size:13px;">${escapeHtml(grupo.titulo)}</span>
                <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                  <span style="font-size:11px;color:var(--texto-3);">${data}</span>
                  <button class="btn-excluir-notif" data-ids="${grupo.itens.map(n=>n.id).join(',')}" title="Excluir notificação" style="background:none;border:none;color:var(--vermelho,#ef4444);cursor:pointer;font-size:14px;padding:2px 4px;">🗑</button>
                </div>
              </div>
              <div style="font-size:12px;color:var(--texto-2);margin-bottom:4px;">${escapeHtml(grupo.mensagem)}</div>
              <div style="font-size:11px;color:var(--texto-3);">Para: ${escapeHtml(destinoLabel)} · ${qtdLidas}/${grupo.itens.length} lida(s)</div>
            </div>`;
          }).join('') : `<div class="empty-state"><div class="icon">🔔</div><div class="msg">Nenhuma notificação enviada</div></div>`}
        </div>

      </div>
    `;

    document.querySelectorAll('.btn-excluir-notif').forEach(btn=>{
      btn.onclick = async () => {
        const ids = btn.getAttribute('data-ids').split(',');
        const confirmMsg = ids.length > 1
          ? `Excluir esta notificação? Ela foi enviada para ${ids.length} participantes e todas as cópias serão removidas. Essa ação não pode ser desfeita.`
          : 'Excluir esta notificação? Essa ação não pode ser desfeita.';
        if(!confirm(confirmMsg)) return;
        btn.disabled = true;
        const { error } = await sb.from('notificacoes').delete().in('id', ids);
        if(error){ toast('Erro ao excluir: ' + error.message, 'error'); btn.disabled = false; return; }
        toast(ids.length > 1 ? `Notificação excluída (${ids.length} cópias removidas).` : 'Notificação excluída.');
        await Store.reloadNotificacoes();
        render();
      };
    });

    document.getElementById('btn-enviar-notif').onclick = async () => {
      const dest = document.getElementById('notif-dest').value;
      const titulo = document.getElementById('notif-titulo').value.trim();
      const mensagem = document.getElementById('notif-msg').value.trim();
      if(!titulo){ toast('Informe o título.', 'error'); return; }
      if(!mensagem){ toast('Informe a mensagem.', 'error'); return; }

      const btn = document.getElementById('btn-enviar-notif');
      btn.disabled = true; btn.textContent = 'Enviando...';

      const destinatarios = dest === 'todos' ? participantes.map(u=>u.id) : [dest];
      const inserts = destinatarios.map(uid=>({ usuario_id: uid, titulo, mensagem }));

      const { error } = await sb.from('notificacoes').insert(inserts);
      if(error){ toast('Erro ao enviar: ' + error.message, 'error'); btn.disabled=false; btn.textContent='📤 Enviar notificação'; return; }

      toast(`Notificação enviada para ${destinatarios.length === 1 ? '1 participante' : destinatarios.length + ' participantes'}!`);
      await Store.reloadNotificacoes();
      render();
    };
  };

  render();
};

// ---------------------- PALPITES DO BOLÃO ----------------------
Pages.palpitesBolao = function(bolao){
  App.setTopbar(`Palpites — ${bolao.nome}`, 'Acompanhe os palpites de cada participante por jogo');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-outline" id="btn-voltar-boloes">← Voltar</button>`;
  document.getElementById('btn-voltar-boloes').onclick = () => Pages.adminBoloes();

  const db = Store.data;
  const jogos = db.jogos.filter(j=>j.bolaoId===bolao.id)
    .sort((a,b)=> new Date(a.dataHora)-new Date(b.dataHora));
  const participantes = db.usuarios.filter(u=>u.perfil==='participante');

  if(!jogos.length){
    document.getElementById('content').innerHTML = `
      <div class="empty-state"><div class="icon">⚽</div><div class="msg">Nenhum jogo cadastrado neste bolão</div></div>`;
    return;
  }

  const html = jogos.map(j=>{
    const finalizado = j.status === 'finalizado';
    const temResultado = j.placarMandante !== null && j.placarVisitante !== null;
    const palpitesDoJogo = db.palpites.filter(p=>p.jogoId===j.id);

    const statusJogo = finalizado
      ? `<span style="color:var(--azul-2);font-weight:700;">Finalizado · ${j.placarMandante} × ${j.placarVisitante}</span>`
      : j.dataHora && new Date(j.dataHora) <= new Date()
      ? `<span class="live-badge"><span class="pulse"></span>Ao vivo</span>`
      : `<span style="color:var(--texto-3);">Agendado · ${j.dataHora ? new Date(j.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : 'sem data'}</span>`;

    // Uma linha por participante
    const linhas = participantes.map(u=>{
      const meus = palpitesDoJogo.filter(p=>p.usuarioId===u.id)
        .sort((a,b)=>a.numeroPalpite-b.numeroPalpite);

      if(!meus.length) return `<tr>
        <td style="font-weight:600;">${escapeHtml(u.nome)}</td>
        <td colspan="3" style="color:var(--texto-3);font-size:12px;">— não apostou</td>
      </tr>`;

      return meus.map((p, i)=>{
        const pts = p.pontos || 0;
        const corPts = pts > 0 ? 'var(--verde)' : 'var(--texto-3)';
        const pag = db.pagamentos.find(x=>x.palpiteId===p.id);
        const statusPag = pag ? Pages._badgePagamento(pag.status) : '';
        return `<tr>
          <td style="font-weight:600;${i>0?'color:var(--texto-3);font-size:12px;':''}">${i===0?escapeHtml(u.nome):'↳ aposta '+(i+1)}</td>
          <td class="font-mono" style="color:var(--verde);font-weight:700;">${p.placarMandante} × ${p.placarVisitante}</td>
          <td>${temResultado ? `<span class="font-mono" style="color:${corPts};font-weight:700;">${pts} pts</span>` : statusPag}</td>
          <td style="font-size:10.5px;color:var(--texto-3);">${escapeHtml(p.codigoVerificacao||'')}</td>
        </tr>`;
      }).join('');
    }).join('');

    return `
    <div class="card card-flush" style="margin-bottom:16px;">
      <div style="padding:10px 16px;background:var(--bg-3);border-bottom:1px solid var(--linha);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:700;">${escapeHtml(j.mandante)} × ${escapeHtml(j.visitante)}</span>
        <span>${statusJogo}</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Participante</th><th>Palpite</th><th>${finalizado?'Pontos':'Pagamento'}</th><th>Código</th></tr></thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = html;
};

// ---------------------- JOGOS & RESULTADOS ----------------------
Pages.adminJogos = function(){
  App.setTopbar('Jogos & Resultados', 'Cadastre partidas e lance os placares oficiais');
  const db = Store.data;
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" id="btn-novo-jogo">+ Novo jogo</button>`;
  document.getElementById('btn-novo-jogo').onclick = () => {
    if(db.boloes.length===0){ toast('Cadastre um bolão antes de adicionar jogos.', 'error'); return; }
    App.openModal('jogo-form', null);
  };

  const ordenados = [...db.jogos].sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora));

  document.getElementById('content').innerHTML = `
    <div class="grid grid-3" id="jogos-grid">
      ${ordenados.length ? ordenados.map(j => Pages._sumulaEditavel(j)).join('') : `
        <div class="empty-state" style="grid-column:1/-1;"><div class="icon">⚽</div><div class="msg">Nenhum jogo cadastrado</div></div>`}
    </div>
  `;
  Pages._bindSumulaEvents();
};

Pages._sumulaEditavel = function(j){
  const db = Store.data;
  const bolao = db.boloes.find(b=>b.id===j.bolaoId);
  const finalizado = j.status==='finalizado';
  const emAndamento = j.status==='em_andamento';
  const isLive = !finalizado && (emAndamento || (j.dataHora && new Date(j.dataHora) <= new Date()));
  return `
  <div class="sumula">
    <div class="sumula-head">
      <span class="comp">${escapeHtml(bolao?bolao.nome:'')}</span>
      ${isLive ? `<span class="live-badge"><span class="pulse"></span>Ao vivo</span>` : `<span>${escapeHtml(j.rodada||'')}</span>`}
    </div>
    <div class="sumula-body">
      <div class="sumula-team">${bandeira(j.mandanteSigla, j.mandante)}<div class="name">${escapeHtml(j.mandante)}</div></div>
      <div class="placar-box" data-placar-jogo="${j.id}">
        <input type="number" min="0" class="placar-input font-mono" data-jogo="${j.id}" data-lado="mandante" value="${j.placarMandante??''}" placeholder="-">
        <span class="placar-sep">×</span>
        <input type="number" min="0" class="placar-input font-mono" data-jogo="${j.id}" data-lado="visitante" value="${j.placarVisitante??''}" placeholder="-">
      </div>
      <div class="sumula-team">${bandeira(j.visitanteSigla, j.visitante)}<div class="name">${escapeHtml(j.visitante)}</div></div>
    </div>
    <div class="sumula-foot">
      <span>${j.dataHora ? new Date(j.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Sem data'} · ${finalizado?'<strong style="color:var(--azul);">Finalizado</strong>':(emAndamento?'<strong style="color:var(--verde);">Em andamento</strong>':'Agendado')}</span>
      <span class="flex-row" style="gap:6px;flex-wrap:wrap;">
        <button class="btn btn-sm btn-outline" data-ver-palpites="${j.id}">👁 Palpites</button>
        <button class="btn btn-sm btn-outline" data-edit-jogo="${j.id}">Editar</button>
        ${!finalizado ? `<button class="btn btn-sm btn-outline" data-atualizar-placar="${j.id}" style="border-color:var(--verde);color:var(--verde);">⚽ Atualizar placar</button>` : ''}
        <button class="btn btn-sm btn-primary" data-salvar-placar="${j.id}">Salvar resultado</button>
        <button class="btn btn-sm btn-danger" data-del-jogo="${j.id}">×</button>
      </span>
    </div>
  </div>`;
};

Pages._bindSumulaEvents = function(){
  // Atualiza o placar parcial sem encerrar o jogo (status vira/permanece 'em_andamento').
  // Usado pelo admin para refletir gols em tempo real durante a partida.
  document.querySelectorAll('[data-atualizar-placar]').forEach(btn=>{
    btn.onclick = async () => {
      const jogoId = btn.dataset.atualizarPlacar;
      const inM = document.querySelector(`[data-jogo="${jogoId}"][data-lado="mandante"]`);
      const inV = document.querySelector(`[data-jogo="${jogoId}"][data-lado="visitante"]`);
      if(inM.value==='' || inV.value===''){ toast('Informe os dois placares.', 'error'); return; }
      const placarMandante = parseInt(inM.value,10);
      const placarVisitante = parseInt(inV.value,10);

      btn.disabled = true; const textoOriginal = btn.textContent; btn.textContent = 'Atualizando...';

      const { error } = await sb.from('jogos').update({
        placar_mandante: placarMandante,
        placar_visitante: placarVisitante,
        status: 'em_andamento',
      }).eq('id', jogoId);

      btn.disabled = false; btn.textContent = textoOriginal;
      if(error){ toast('Erro ao atualizar placar: ' + error.message, 'error'); return; }

      toast('⚽ Placar atualizado em tempo real!');
      await Store.reloadJogos();
      Pages.adminJogos();
    };
  });

  document.querySelectorAll('[data-salvar-placar]').forEach(btn=>{
    btn.onclick = async () => {
      const jogoId = btn.dataset.salvarPlacar;
      const inM = document.querySelector(`[data-jogo="${jogoId}"][data-lado="mandante"]`);
      const inV = document.querySelector(`[data-jogo="${jogoId}"][data-lado="visitante"]`);
      if(inM.value==='' || inV.value===''){ toast('Informe os dois placares.', 'error'); return; }
      const db = Store.data;
      const jogo = db.jogos.find(j=>j.id===jogoId);
      const placarMandante = parseInt(inM.value,10);
      const placarVisitante = parseInt(inV.value,10);

      btn.disabled = true; btn.textContent = 'Salvando...';

      const { error } = await sb.from('jogos').update({
        placar_mandante: placarMandante,
        placar_visitante: placarVisitante,
        status: 'finalizado',
        resultado_lancado_por: Session.currentUser().id,
        resultado_lancado_em: new Date().toISOString(),
      }).eq('id', jogoId);

      if(error){ toast('Erro ao salvar resultado: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Salvar resultado'; return; }

      await Store.reloadJogos();
      await Logic.recalcularPontosDoJogo(jogoId);
      Store.log(Session.currentUser().id, `Resultado lançado: ${jogo.mandante} ${placarMandante} x ${placarVisitante} ${jogo.visitante}.`);
      toast('Resultado salvo e pontuações recalculadas!');
      Pages.adminJogos();
    };
  });
  document.querySelectorAll('[data-ver-palpites]').forEach(btn=>{
    btn.onclick = () => {
      const jogoId = btn.dataset.verPalpites;
      const db = Store.data;
      const jogo = db.jogos.find(j=>j.id===jogoId);
      const palpitesDoJogo = db.palpites.filter(p=>p.jogoId===jogoId)
        .sort((a,b)=> {
          const ua = db.usuarios.find(u=>u.id===a.usuarioId);
          const ub = db.usuarios.find(u=>u.id===b.usuarioId);
          return (ua?ua.nome:'').localeCompare(ub?ub.nome:'');
        });

      App.openModal('palpites-jogo', { jogo, palpites: palpitesDoJogo });
    };
  });

  document.querySelectorAll('[data-edit-jogo]').forEach(btn=>{
    btn.onclick = () => App.openModal('jogo-form', Store.data.jogos.find(j=>j.id===btn.dataset.editJogo));
  });
  document.querySelectorAll('[data-del-jogo]').forEach(btn=>{
    btn.onclick = async () => {
      const jogo = Store.data.jogos.find(j=>j.id===btn.dataset.delJogo);
      if(!confirm(`Excluir o jogo ${jogo.mandante} x ${jogo.visitante}?`)) return;
      btn.disabled = true;
      // ON DELETE CASCADE remove palpites vinculados automaticamente.
      // Se o jogo já começou e existem palpites travados, o banco vai rejeitar a exclusão
      // dos palpites (preserva o comprovante) e isso retorna erro aqui — esperado e correto.
      const { error } = await sb.from('jogos').delete().eq('id', jogo.id);
      if(error){
        toast('Não foi possível excluir: ' + (error.message.includes('travado') ? 'já existem palpites travados para este jogo.' : error.message), 'error');
        btn.disabled = false;
        return;
      }
      Store.log(Session.currentUser().id, `Jogo "${jogo.mandante} x ${jogo.visitante}" excluído.`);
      toast('Jogo excluído.');
      await Store.loadAll();
      Pages.adminJogos();
    };
  });
};

Pages.adminParticipantes = function(){
  App.setTopbar('Participantes', 'Gerencie cadastros e status dos participantes');
  const db = Store.data;
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" id="btn-novo-part">+ Novo participante</button>`;
  document.getElementById('btn-novo-part').onclick = () => App.openModal('usuario-form', null);

  const participantes = db.usuarios.filter(u=>u.perfil==='participante');

  const renderContent = (lista) => {
    document.getElementById('content').innerHTML = `
      <div class="toolbar">
        <input type="text" class="search-box" id="busca-part" placeholder="Buscar por nome ou e-mail...">
        <div class="text-muted">${lista.length} participante(s)</div>
      </div>

      <!-- Desktop: tabela -->
      <div class="card card-flush part-desktop">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Cadastro</th><th>Status</th><th></th></tr></thead>
          <tbody id="tbody-part">
            ${Pages._linhasParticipantes(lista)}
          </tbody>
        </table>
      </div>

      <!-- Mobile: cards -->
      <div class="part-mobile" id="part-cards">
        ${Pages._cardsParticipantes(lista)}
      </div>
    `;
    Pages._bindParticipantesEvents();

    document.getElementById('busca-part').oninput = (e) => {
      const q = e.target.value.toLowerCase();
      const filtrados = participantes.filter(u =>
        u.nome.toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)
      );
      document.getElementById('tbody-part').innerHTML = Pages._linhasParticipantes(filtrados);
      document.getElementById('part-cards').innerHTML = Pages._cardsParticipantes(filtrados);
      Pages._bindParticipantesEvents();
    };
  };

  renderContent(participantes);
};

Pages._linhasParticipantes = function(lista){
  if(!lista.length) return `<tr><td colspan="6"><div class="empty-state"><div class="msg">Nenhum participante encontrado</div></div></td></tr>`;
  return lista.map(u => `
    <tr>
      <td style="font-weight:600;">${escapeHtml(u.nome)}</td>
      <td>${escapeHtml(u.email)}</td>
      <td>${escapeHtml(u.telefone||'—')}</td>
      <td>${fmtDate(u.dataCadastro)}</td>
      <td><span class="badge-status ${u.status==='ativo'?'badge-ativo':'badge-inativo'}">${u.status}</span></td>
      <td class="flex-row">
        <button class="btn btn-outline btn-sm" data-edit-user="${u.id}">Editar</button>
        <button class="btn btn-outline btn-sm" data-toggle-user="${u.id}">${u.status==='ativo'?'Inativar':'Ativar'}</button>
      </td>
    </tr>
  `).join('');
};

Pages._cardsParticipantes = function(lista){
  if(!lista.length) return `<div class="empty-state"><div class="icon">☷</div><div class="msg">Nenhum participante encontrado</div></div>`;
  return lista.map(u => `
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <div style="font-weight:700;font-size:14px;">${escapeHtml(u.nome)}</div>
          <div style="font-size:12px;color:var(--texto-2);">${escapeHtml(u.telefone||'—')}</div>
        </div>
        <span class="badge-status ${u.status==='ativo'?'badge-ativo':'badge-inativo'}">${u.status}</span>
      </div>
      <div style="font-size:12px;color:var(--texto-3);margin-bottom:10px;">
        Cadastro: ${fmtDate(u.dataCadastro)}
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" style="flex:1;" data-edit-user="${u.id}">✎ Editar</button>
        <button class="btn btn-outline btn-sm" style="flex:1;" data-toggle-user="${u.id}">${u.status==='ativo'?'Inativar':'Ativar'}</button>
      </div>
    </div>
  `).join('');
};

Pages._bindParticipantesEvents = function(){
  document.querySelectorAll('[data-edit-user]').forEach(el=> el.onclick = ()=>{
    const id = el.getAttribute('data-edit-user');
    const usuario = Store.data.usuarios.find(u=> String(u.id)===String(id));
    if(!usuario){ toast('Participante não encontrado — recarregue a página.','error'); return; }
    App.openModal('usuario-form', usuario);
  });
  document.querySelectorAll('[data-toggle-user]').forEach(el=> el.onclick = async ()=>{
    const id = el.getAttribute('data-toggle-user');
    const u = Store.data.usuarios.find(x=> String(x.id)===String(id));
    if(!u){ toast('Participante não encontrado.','error'); return; }
    const novoStatus = u.status==='ativo' ? 'inativo' : 'ativo';
    el.disabled = true;

    const { error } = await sb.from('perfis').update({ status: novoStatus }).eq('id', u.id);
    if(error){ toast('Erro ao atualizar status: '+error.message,'error'); el.disabled=false; return; }

    u.status = novoStatus;
    Store.log(Session.currentUser().id, `Participante "${u.nome}" marcado como ${u.status}.`);
    toast('Status atualizado.');
    await Store.reloadUsuarios();

Pages._exportarCSV = function(tipo){
  const db = Store.data;
  let rows = [], filename = `${tipo}.csv`;
  if(tipo==='participantes'){
    rows = [['Nome','E-mail','Telefone','Status','Data de cadastro']];
    db.usuarios.filter(u=>u.perfil==='participante').forEach(u=> rows.push([u.nome,u.email,u.telefone,u.status,u.dataCadastro]));
  } else if(tipo==='pagamentos'){
    rows = [['Participante','Bolão','Valor inscrição','Valor pago','Vencimento','Status']];
    db.pagamentos.forEach(p=>{
      const u = db.usuarios.find(x=>x.id===p.usuarioId), b = db.boloes.find(x=>x.id===p.bolaoId);
      rows.push([u?u.nome:'', b?b.nome:'', p.valorInscricao, p.valorPago, p.dataVencimento, p.status]);
    });
  } else if(tipo==='ranking'){
    rows = [['Posição','Nome','Pontuação','Acertos','Erros','Aproveitamento %']];
    const bolao = db.boloes[0];
    if(bolao) Logic.rankingDoBolao(bolao.id,'geral').forEach(l=> rows.push([l.posicao,l.usuario.nome,l.pontuacao,l.acertos,l.erros,l.aproveitamento]));
  } else if(tipo==='jogos'){
    rows = [['Mandante','Visitante','Placar mandante','Placar visitante','Data','Status']];
    db.jogos.forEach(j=> rows.push([j.mandante,j.visitante,j.placarMandante,j.placarVisitante,j.dataHora,j.status]));
  } else if(tipo==='sorteios'){
    rows = [['Nome','Valor cota','Total cotas','Cotas vendidas','Status','Vencedor (número)']];
    db.sorteios.forEach(s=> rows.push([s.nome,s.valorCota,s.totalCotas,s.cotas.length,s.status, s.vencedor?s.vencedor.numero:'']));
  } else if(tipo==='premiacoes'){
    rows = [['Sorteio','Número vencedor','Participante','Data']];
    db.sorteios.filter(s=>s.vencedor).forEach(s=>{
      const u = db.usuarios.find(x=>x.id===s.vencedor.usuarioId);
      rows.push([s.nome, s.vencedor.numero, u?u.nome:'', s.vencedor.data]);
    });
  }
  const csv = rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Relatório exportado.');
};
